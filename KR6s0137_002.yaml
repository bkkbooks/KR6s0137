body:
  text: 京兆靜法寺沙門慧菀述經卷第四十一十定品之二不處於陸毛詩傳曰高厚廣平曰陸近之近渠靳反煞也諸心樂次第樂牙教反謂欲樂也歌羅邏此云薄酪謂初入胎如薄酪也白分義分浮問反圓光一尋何休要云八寸曰咫三尺曰武五尺曰壘六尺曰步七尺曰承八尺曰尋十尺曰丈丈六曰常小雅曰四尺曰仞倍仞曰尋倍尋曰常其量七肘佛本行集云肘謂二尺也一俱盧舍依毗曇中一尺五寸為一肘四肘為一弓三百弓為一里四里為一俱盧舍淮計一里三百六十步則一俱盧舍有一千四百四十步也依俱舍論第十二云分扸諸色至一極微故一極微為色七極微為一微量積微至七為一金塵七金塵為水塵量水積七為一兔毛塵積七兔毛塵為一羊毛塵量積羊毛塵七為一牛毛塵積七牛毛塵為隟遊塵量隙塵七為一蟣七蟣為一虱七虱為獷麥七麥為一指節二十四指撗布為肘竪四肘為弓竪積五百弓為一俱盧舍即是從肘至阿練若中間量者也半由旬量由旬梵言具云踰繕那此曰和合謂以多俱盧舍和合成故案佛本行集第十二云七微塵成一窗牖塵七窗塵成一兔毛頭塵七兔毛塵成一羊毛頭塵七羊毛成一牛毛頭塵七牛毛塵成一蟣七蟣成一虱七虱成一芥子七芥子成一大麥七大麥成一指節七指節成半尺二尺成一肘四肘成一弓五弓成一杖二十杖名一息八十息名一俱盧舍八俱盧舍成一由旬淮此方尺量二里餘八十步當一俱盧舍計一由旬合有一十七里餘二百八十步或日一由旬如此方一驛地也經卷第四十二十定品之三北俱盧具云鬱怛羅句盧此翻為高上也東毗提訶毗此云勝提訶日身也又毗云種種提訶典也種種稼穡稼音稼穡音色馬融注論語曰樹五穀曰稼毛詩傳曰種之曰稼𣫍之曰穡案鄭玄注周禮云稼穡為言其猶嫁穡謂種子相生貪苗實之利也修羅退衄衄女六如育二反玉篇云血折挫也入藕絲孔藕五荀反字冝從未𠃵闥婆城此云尋香城也謂十寶山間有音樂神名𠃵闥婆忉利諸天須音樂時此神身有異相即知天意往彼娛樂因此以事西域謂諸樂兒亦曰𠃵闥婆然西域樂兒多為幻彼幻作城郭須如故因即謂龍所現城郭為𠃵闥婆城也恆伽河淮經香山頂上有阿耨達池其池四面各流出一河東面私陀河從金剛師子口流出其沙金剛東流入震旦國便入東海南面恆伽河從銀象口流出其沙白銀流入東印度便入南海西面信度河從金牛口流出其沙黃金便入西海北面縛芻河從琉璃馬口流出其沙是琉璃流入波斯拂林便入北海其池樂廣五十由旬四面口各一由旬也光明鑒徹鑒照也徹通也言光照內外通現也澒涌奔馳澒胡動反涌字正冝作溶故楚辭注云澒潛水去貌漢書高紀傳集注云澒溶竦涌也經本作涌者誤也奇香發越漢書集注曰發起香氣射散也謂香氣速疾遍布著人也皆得潤洽洽侯夾反廣雅曰洽潰也阿那婆達多龍王阿無也那婆達多熱惱也諸龍皆受熱沙之苦此龍元故立其名耳經卷第四十三十定品之四無替邇雅曰替廢也從諸善友而得出生友字經本有作支字深為也終不匱止匱渠位反廣雅匱少也漢書音義曰匱空乏也摩那斯龍王摩那意也斯夜也流出也言此龍王凡興雲雨皆從慈心出也嶷然高出嶷謂崱嶷也字指曰崱嶷山峯貌也伊那鉢那象王住金脅山伊那鉢那此云香其象身長九由旬高三由旬常住第一金山之脅即是最初計都末底山也經卷第四十四十通品閻魔王正云琰魔邏闍此曰遮止謂誠勗罪人之也十忍品舍支正云設施謂月之別名帝釋夫人取為號也無方無隅方謂四方也鄭玄注考工記曰隅角也不捨衆善軛軛於革反珠叢曰軛謂轅端撗木也今此謂駕擔衆善勒行不捨如牛駕重長途力進也徒令劉熙曰徒猶獨也經卷第四十五阿僧祇品一百洛叉為一俱胝洛又此云万也俱胝此云億也又技此方黃帝笇法惣有二十三數謂一二三四五六七八九十百千萬億兆京垓𥞑壤溝澗王載從万已去有三等數法其下者十十變之中者百百變之上者倍倍變之今此阿僧祇中上數法故云一百洛叉為一俱胝俱胝當此億也阿庾多兆也那由他京也餘皆依次準配可知今案此經十百千万十十變之從万至億百倍變之從億已去皆以能數量為一數復數至與能數量等變之能本行集第十二中百百變之也矜羯矜居淩反摩婆婆之上聲此後婆字並上聲呼之伽伽之上聲下毗伽亦同此攞郎我反毗佉擔擔多甘反攞陀醫於奚反阿麼麼莫我反勃蒲沒反翳煙計反薜蒲計反窣蘇沒反睥普計反謎莫計反荼宅加反壽量品娑婆此云堪忍也謂具足衆惡境對堪行忍也釋迦牟尼釋迦能也種族望稱也釋音作鑠呼迦字作告俄反呼牟尼此云寂默也德行之號阿陀佛正云阿弭陀娑耶此云無量壽也諸菩薩住處品支提山支提本是塔廣之名此山似之故因為號然支提此云生淨信之所具釋如下七十五中毗舍離此釋為廣博謂此城於中印度諸城之中最廣大也或亦翻為廣嚴也度度羅城或云摩偷羅亦云摩突羅此云孔雀城或云蜜善皆古事者也俱那城或言俱陳那耶言俱陳者是名此云大盆那耶法律也昔此城未立之時有一五通仙名俱陳而於此地置一大盆蓄水若池恆在盆側修仙法律亦常為人説護淨經及養性法於後學徒皆以師名及法為其姓氏人衆漸廣即於此處建立城郭故此舉國人今皆姓俱陳那城亦因之立號耳目真鄰陀窟目真或曰牟真此云解脫是龍名也鄰陀此云處也謂有龍於此窟中間法脫龍苦故名解脫處窟也摩蘭陀國未翻甘菩遮國未翻震旦國或曰支那亦曰真丹此翻為思惟以其國人多所思慮多所計作故以為名即今此漢國是也那羅延此云堅固疏勒國正名佚路數恆勒古來此万存略呼為疏勒又訛數音為疏然此名乃是彼國一山之號因云其稱又或翻為𢙣性國以其國人性多獷戾故也迦葉羅國舊名𦋺國此翻阿誰入昔此國未建之時其地有大龍池人莫敢近其後有一羅漢見其形勝冝人居止乃從龍𠧒容一膝地時龍許之而羅漢變身漸大其膝漸滿龍池龍以言信便捨而去羅漢即以神力𠃵竭其水令百姓於中建立屋宅人衆咸云我等不因聖僧阿誰得入此處故從此語即立其名國即在北印度境𠃵陀羅國次北鄰也菴浮梨摩國菴謂菴羅此云無垢即西域果名其果堪以療疾諸國之中此國最多故以名焉其國即在中印度境內也𠃵陀羅國此云持地國謂昔此國多有道果聖賢任住持其境不為他國侵害也又云𠃵陀是香羅謂陀羅此云遍也言遍此國內多生香氣之花故名香遍國其國在中印度北北印度南二界中間也苫婆羅窟苫式占反苫婆是香花樹名其窟側近多生此樹故因名耳也經卷第四十六佛不思議法品之上寂漠無言玉篇曰無人聲曰寂郭璞注邇匹曰漠謂靜定也逮十力地逮唐槩反説文曰逮及也字從之不從及譏謗譏居疑反説文譏誹也經卷第四十七佛不思議法品之下人王都邑左氏傳曰九有宗庿先君之主曰都無曰邑也漢書音義曰都城也廣匹曰都國也司馬法曰大國五百里為都風俗通曰天子所居之城曰都舊都曰邑也毗舍闍王毗舍闍之王即是東方提頭賴吒此云持國謂護持國土願二部鬼一名毗舍闍此云噉精氣二名𠃵闥婆此曰尋香也倮胡寡力果二反玉篇曰倮祖也字又作裸裸兩躰一切樂器不鼓自鳴鼓字冝從支支者普木普角二反經本有從皮者鍾鼓字也舍利正云設利羅或云實利此翻為身誠敬亦退曰誠信也靡不驚懾懾之葉反鄭注禮記曰聶法也畏懼也經本有作攝字者謬也信樂不回回音回説文曰回轉也今此謂信樂無轉動也經卷第四十八如來十身相海品熙怡微笑凞許基反怡與脂反方言湘潤之間謂喜曰凞怙或曰紛怡説文曰凞恱也怡和也謂容貌和恱也鬚字又作凞也炳然顯現炳彼永反蒼頡篇曰炳者明也謂顯著之明也字又作炳也洞徹洞徒弄反玉篇曰洞猶通徹也字又作回者也其掌安平掌謂舌面平而且安玩味不忘玩字正冝作忨杜注左傳曰忨食也經本作玩字者誤也案孔安注書云戲弄貪玩即受樂之意也上咢俄各反正躰作咢又或作齶右輔下牙左傳宮文奇虢虞之表也猶輔車相依脣亡齒寒杜注曰輔類也車牙車也又注曰輔類車骨盧藏雲盧此云高以在佛上牙故也紺蒱成就紺蒱正云劒蒱此云乃西域果名其色紅赤腹園正云劍蒱三約撗文而佛頸成就彼相故云也今時俗謂頸圓有約為嬰節者是也布十方顏注漢書曰滿也左臀臀徒論反聲類臀尻也尻音苦勞反也其䏶與膊䏶字正冝作脾古文作髀今䏶未詳所出膊字冝作膊今經本作膊者伊尼延鹿王腨伊尼延者鹿名也其毛色多黑腨形傭纖長短得所其鹿王最勝故取為喻腨字又作𬧅舉足將步將欲也步行也王逸注楚辭曰步徐行也足跟跟各痕反因陀羅尼羅因陀羅此云帝也尼羅此云青也如來隨好光明功德品第三十五隨好呼告反令衆生愛樂故又音呼皓反資嚴大相益殊勝故摩耶夫人摩耶此云幻也由此菩薩唯依大𭛔智幻法門行故故此名夫人者梵本云苐脾此翻女天案鄭注禮云諸俠之妃曰夫人玉篇曰呼婦人為夫人者亦所以崇敬之稱也又夫者男子美稱婦因夫以成人故名夫人也西域呼王妃為苐脾呼男夫為苐婆也懺悔懺謂懺摩此云請忍謂請前人忍受我悔罪也經卷第四十九普賢行品第三十六樂近凡庸廣匹曰凡輕也漢書集注口庸庸微小也言其輕薄寒微眇小之人耳習童蒙法易稱蒙卦者謂童蒙來求我非我求童蒙蒙者愓也韓康注云蒙昧幼小之象又玉篇曰童幼迷意也廣雅曰童癡也鄭玄注周禮蒙冒也毛詩傳曰蒙覆也言童幼之心愚昧所為惛如以物覆蔽之口如啞羊障啞於雅反巧能宣説大乘妙義名無啞羊障大智度論第三云啞羊僧者謂雖不破戒鈍根無惠不別好𢙣不知輕重不知有罪若有僧事二人共諍不能斷決默然無言譬如白羊乃至人煞不能作聲是名啞羊僧也洎于法界洎字正冝作暨暨音渠祕反珠藂曰暨謂及預也杜注左傳曰暨至也經作洎者也充洽洽侯夾反小雅曰充備也玉篇曰洽濡治潤之也工幻師韻圃稱工巧也謂巧能於幻術經卷第五十如來出現品第三十七之一偏祖祖唐𮧊反露也字從示又音宅莧反非此所須也右跽路其几反跪也如我惟忖忖忩本反顏注漢書曰惟思也珠藂曰恃惻度也瞻仰如來仁及我有仁德者號之為仁故諡法曰資賢視之曰仁煞身以成人曰仁度功而行曰仁周禮曰天德曰仁禮記云上下相親曰仁論語云克己復禮曰仁鄭注禮云施恩曰仁白虎通曰仁者是忍好生愛人者也佉陀羅山亦曰軻梨羅此即木名謂此方苦梗木也由彼山中多有此木故立其名耳尼民陀羅山此翻為許邊以彼山是七重金山中最外邊故然即院繞護持餘內六山故名持邊也目真鄰陀山目真此云解脫即是龍名也鄰陀此云處也謂此山中是解脫住處也水族衆生孔安國注書曰族類也謂水畜之流類也大雨名洪霔注之反洪大也併𢙣寫水曰霔也變溼令燥燥蘇早反燥乾也變字從變作文有從反者不是字也溼字有作濕者誤也廓徹虛空廓苦郭反尓匹曰廓大也今謂寬大遍虛空量也普照無私玉篇曰事不公為私王逸注楚辭曰竊愛為私也郭象注莊子曰世所謂無私者釋已而愛人也言無已情偏有所為也私字加持者非也經卷第五十一如來出現品之二作務作則各反務事業也或牟薩羅或曰牟婆羅此云紫色寶哮吼哮呼教反吼呼口反洞然洞徒弄反韻團稱洞徹也謂通徹火然之狀也字或冝作炯炯音徒東反韓詩傳曰炯謂草傳火焰也經卷第五十二如來出現品之三優波尼沙陀分已見第十七卷鼓楊海水鼓公戶反説文曰鼓擊也字從支不從皮也則便謝王逸注楚辭曰謝去也謂神識去身者也積同須彌説文曰積聚也聚謂堆聚聚音疾喻反也如乾草𧂐𧂐即賜反鄭玄注周禮塔小曰委垖大曰積積字從草者俗也經卷第五十三離世間品第三十八之一知諸稱謂稱昌孕反稱順也漢書音義云謂者指趣也今謂於法門意趣皆順知漢書又曰謂者稱也事冝也謂凡諸事物知其名自識其所冝皆曰稱謂也知諸制令令力政反制謂禁制令謂法令也長嬰疾苦嬰於征反漢書曰嬰繞也謂常為疾苦之所纏繞也經卷第五十四離世間品之二啓一切衆生心意玉篇曰啓開也古體作啓也間無空處間古間反謂中間也經卷第五十五離世間品之三善言開喻漢書音義曰喻曉也蒼頡篇曰喻諫也棒打屠割棒字正冝作棓或亦為柈今經本作棒杖之棒非打棓字然復有從手邊作奉者乃是棒持之轉違經意也廣雅曰棓箠也又有木邊作吉者即是棒杖之棓字體耳誓期自勉鄭注禮記曰勉勤也玉篇曰自勸強也撾打楚撻撾陟苽反撻他沫反説文曰撾箠也鄭玄注周禮箠擊也楚杖也又注周禮曰撻猶杖之以荊也撾字從木古體作葉之也挑天雕反或級其頭漢書衛青霍去病傳第二十五云斬首三千一十七級顏師古曰本以斬一首辦爵一級故即因謂斬首為級亦即又名生護一人為一級也珠叢曰斬首一名為級也無央數劫央於良反王逸注楚辭曰央盡也經卷第五十六離世間品之四迫隘隘於懈反玉篇曰迫隘也隘狹也夫狹窄必相逼無所觸嬈嬈乃了反三蒼嬈擾也孔安注書曰擾亂也説文曰擾煩也悉稱稱昌孕愜可也又邇雅曰稱好也郭璞注云事稱人意皆好也補特伽羅此翻為數取趣謂數造趣因數取趣果也舊翻為人隨方語便非正刻字譯也心恆𮨇復已見第二十三卷嬉戲嬉許其反切韻稱戲遊也經卷第五十七離世間品之五得預預餘茹反珠藂曰凡事相及曰預字古作與也菩提薩埵依佛地論主親光菩薩以三義釋菩提薩埵具如彼論中也不弛弛式尓反論語云君子不弛其親孔安注曰弛易也韋昭注漢書曰弛廢也郭璞注尓雅曰弛放也鄭玄注禮記曰弛棄也此中經文舍於多義故具存之無險詖故已見苐四卷中身心憺怕憺徒敢徒嚂二反怕暜白反王逸注楚辭曰憺安也廣雅曰怕靜也憺字又作淡淡二體也慣習慣古患反案諸字書正宜作慣有作串字者也癡苦角反有從下作卯者不是字也經卷第五十八離世間品之六殘毀蒼頡篇曰殘傷也無中息中陟仲反難處受生難那幹反難處謂八難中五也捨一切烏波提涅法鳥波此翻為有提云苦也謂二乘所得無餘涅未離變易行苦隨故有餘涅反諸外道所計涅並未離三苦故法即涅或通教等於彼悉捨故云捨一切有苦涅法樂法樂義以法為樂此中三箇樂字初二首五教反後一音郎各反如虹霓色虹古巷胡公二反霓研奚反蔡雍月令曰虹螮𧐒也謂陰陽文接之氣而著之形色雄者曰虹雌者曰霓者也無主無待邇雅曰待須也謂凡事相須待藉於他也今此謂求緣無作即亡待義也無著無行行遐庚反無有瘡疣疣有鳩反廣雅疣腫也説文曰疣贅也贅謂賸聚肉也贅音支鋭反疣字又作疣也瘢痕瘢蒱寒反痕戶恩反解因自悟因由也言辟支悟於苦無常等但用自觀緣生克證不依師受故立其名為獨覺也而強為説強其兩反志尚涅顏注漢書曰尚崇也求其罪舋覺許覲反玉篇曰舋謂有禍兆也或以妙義授非其人顏注蕭望之傳曰將非其人者言不才之才也謂有器量者也嚬蹙不喜嚬脾仁反感子六反玉篇曰嚬蹙謂憂愁不樂之狀也賈注國語曰頻近也毛詩傳曰蹙促也言人有憂愁則皺撮眉額鼻目皆相促近也又案説文渡水向岸水文叢皺亦謂之嚬蹙然愁憂之頻頻下著卑今從省之不用也經本有傍安口者俗也伺其過失伺相吏反鄭玄注周禮曰伺猶察也玉篇曰伺候也方言曰伺視也自開而北凡竊相視謂之伺也頑佷佷何墊反左氏傳曰心不測德義之經曰頑也杜注左傳曰佷戾也説文曰佷不任從也佷字正體從彳今人者俗也我所吞吞他痕他賢反廣雅廣吞滅也醒悟醒素形桑回二反天魔波旬具云提婆魔羅播裨言提婆者此云天也摩羅障得也播裨罪惡也謂此類生天宮性好勸人造惡退善令不得出離故也悉知將有廣雅曰將欲也當也徙置從仙紫反蒼頡篇曰徙移也鄭玄注考工記云置猶著於地也置字本徙𠕀下直今從曰者俗也侍衛蒼頡篇曰侍從也毛詩傳曰侍近也言側近左右扶侍之也王弼注易曰衛護也經卷第五十九離世間品之七免濟免亡辨反杜注左傳曰免脫也毛詩傳曰濟渡也言令物脫苦渡難也欣慰廣雅曰欣喜也毛詩傳曰慰安也言歡喜則心安也圖書璽鄭玄注周禮曰圖畫也璽也蔡雍獨斷曰天子之璽以螭虎劒古者尊卑共之月令秦以前諸侯卿丈夫皆曰璽自茲已降天子獨稱諸侯不敢用也秦王子嬰上高祖傳國璽文曰受命于天既壽永昌此章古名璽飾今謂斗撿文也螭音勑支反弧矢劒戟弧戶孤反矢式耳反戟居逆反説文曰孤木曰弓考工記曰孤名弧謂往多而來寡也易曰刺謂之矢矢即箭也戟有三歧歧皆兩刃或中有小子名雄戟或有兩岐名偏戟矢字又作矢博奕嬉戲嬉許其反博字正冝從竹説文曰搏謂戲為戲六薄十二棊也杜注左傳曰奕圍棊也切韻稱嬉遊也親戚戚千曆反孔安注書曰戚近也𮨇野王曰近所以為親也毛詩傳曰相親曰戚戚字正冝從竪心也經本作戚者俗也能忍劬勞劬具虞反毛詩傳曰劬勞病苦也勤劬勞倦猶病苦也正法盈洽洽侯夾反注左傳曰盈充也玉篇洽濡也濡滲閏也菩薩無得乘巾之出三界乘食證反乘謂車馬通稱巾謂服乘之名案周禮巾車氏即掌駕之官主當嚴乘故鄭玄注云巾猶衣也衣音於記反謂莊飾衣帶之也珠藂曰以衣被車謂之巾也此則文言尚簡名有影略故巾車之言當乘車之謂亦猶設席之名以目食客也宴然宴於見反漢書音義曰宴安居也默靜也皎鏡方言曰皎明也廣雅曰鏡照也又可皎然如鏡故曰皎鏡也馳逐廣雅曰馳奔也玉篇曰逐驅也菡花菡胡感反徒感反説文曰芙葉花未發者盛之貌也菡二字玉篇作蘭字書作菡茵説文作莟娛樂杜注左傳曰娛樂也樂即可樂故七娛樂也經卷第六十入法界品第三十九之一室羅筏國舊云舍衛國具稱室羅筏悉底此翻為好道或曰聞物此乃城名非是國號以其城多出人物好行道德五天共聞故名聞物或曰室羅筏悉底者此云聞者城西域俗聞傳記云昔於此處有一老仙修習仙道復有少仙從其受學厥號聞者老仙歿後少仙建立此城即以少仙之名為其城稱然國都號為薩羅但以就勝易彰故城取國號耳逝多林逝多梵言也或曰制多或云祇陀此翻為勝即太子之名當欲造此寺時須達長者買園太子出樹故曰逝多林者也臍藏菩薩案此菩薩名臍臍即是肚臍之臍字冝從肉也師子頻申三昧杜注左傳曰頻齊名申展也謂申展四體之拘急所以解於勞倦故曰頻申也表此三昧能申展自在無得法法界解脫障得拘急勞倦故喻名耳此或全是梵言也刊定記説危樓逈帶逈胡項反鄭注禮記云危高也邇雅曰逈遠也言高樓險絶似空中之遠挂者也棟宇棟都弄反尓雅曰棟屋穩也𢷍即屋脊也字也穩音於靳反階墀軒攬墀直尼反玉篇曰階謂登堂之道也説文曰墀謂以丹塗地即天子丹墀也韋昭注漢書曰軒攬上板也王逸注楚辭曰懢植也縱曰攬橫曰楯𮨇野王曰謂殿上抅攔也階隥欄楯撜多鄧反楯食尹反隥級道也王逸注楚辭云從曰欄撗曰楯楯間子謂之櫺也噔字又作嶝湍激洄澓湍吐宮反激古歷反洄音回澓音服説文曰湍疾瀨也淺水流於砂上曰湍也水文疑邪急疾曰激也三蒼曰水轉洄也澓深也謂洄澓之處其水必深也芬敷芬麩雲反郭璞曰芬謂香氣和調也小雅曰敷布散也舍利弗具云奢唎補怛羅言奢唎者此云鶖鷺鳥也補怛羅者此云子也此尊者母眼黑白分明轉動流利似鶖鷺眼故時共號為奢唎也其尊者依母得名故云鶖鷺子舊翻為身子者也梵本中呼身為設利羅故知懸別也大目𠃵連𠃵渠焉反目連者此云採菽氏即此尊者母姓又以尊者有文神通即將一事為號也然母本族採緑豆仙之苗裔也摩訶迦葉具云摩訶迦葉波言摩訶此云大也迦葉波此云飲光也此尊者上古元祖是大仙人身有光明而能吞蔽燈火之光時人異之號曰飲光仙人因此摽其氏族焉又以尊者有頭陀大行故時與其大飲光名之耳離波多此云所供養之也須菩提此云善現亦曰善實舊云善吉者非阿䨲樓馱正云何泥嚕多此云無滅難陀此云歡喜也劫那此云黃色者謂此尊者上祖是黃頭仙人因為族此則氏族為名耳迦旃延迦旃者一宗之姓氏也延此云胤也言此尊者是彼種族之後胤耳富樓那具云富樓那多羅尼子言富樓那者此云滿也多羅尼者此云願也滿願是尊者母稱子即尊者自身從母立名故曰滿願子也不能遊履履字本作樂者勘梵本是履舉體燋然劉兆注儀禮曰舉畢盡也此言舉體燋者遍體盡燋也烏鷲郭璞注山海經曰鷲者鷲謂即雕也説文曰鷲鳥黑色而多子也翳膜翳於計反文字集略曰翳目障也經本有從羽作者非此所用也捕獵放牧牧叵福莫六二反三蒼曰牧養飼也振恤振之刃反恤須聿反鄭注禮曰振救也又注周禮曰恤憂貧也文云憂恤從心恤少從卩邇雅通用今案諸書依説文從卩為勝均贍均居春反贍市焰反小雅曰贍足也言均平皆使得足也舉世杜注左傳曰舉皆也言世皆不能測也孰有邇雅曰孰誰也凡夫嬰妄惑廣雅曰凡輕也案夫猶人夫嬰繞也言輕庸之人為虛妄感障緾繞也難稱稱昌陵反鄭注禮云稱猶言也廣雅曰稱舉也字正體從立人今多從禾欽歎欽去今反孔安注書曰歎敬也曉悟廣雅曰曉説也説音書春反説文曰悟覺也聲類曰悟解也言説化令覺也經卷第六十一入法界品之二因陀羅因陀羅者此云帝也帝謂帝釋謂帝釋大衙殿上結珠之孔相望更為中表𮞏相圍繞互作主伴同時成就圍繞相應也舟章由反船也明練珠藂曰鎔金使精曰鍊煮絲令熟曰練也今謂善知儀式分明精熟故云明練也又李善注文選曰練蕑也謂蕑分明也君慧比丘梵本中云因陀羅未底比丘言因陀羅者此云君也末底惠也言此比丘智惠比餘比丘最尊如君故曰君惠也經卷第六十二入法界品之三娑羅林娑羅者此云高遠以其林木森竦出於餘林之上也舊翻云堅固者誤由娑囉之與娑羅聲勢相近若呼堅固即轉舌言之若呼高遠直之耳須達多此云善給施無依怙者舊譯云給孤獨者是也婆須達多此云財施或云有善施行威光赫奕赫許挌反奕移益反廣雅曰赫赫威也奕奕明也赫字又作奕字經本亦下著廾者薄奕字也徽纆徽許韋反纆莫北反廣雅曰徽束也珠藂曰纆繩索也案經義謂以愛繩束縛難可解也勒鄙媚反説文謂曰勒謂馬頭爐銜盈玉篇曰盈懈也緩也謂恣懈怠緩也令我載此乘乘食證反王逸注楚辭曰載乘也乘音繩也茵蓐茵於真反蓐如欲反毛詩傳曰茵虎皮也玉篇曰以虎皮為蓐曰茵也茵字又作鞇郭注邇雅曰蓐席也聲類曰蓐薦也案茵蓐二字以草為之者字即從草若以皮為之者字即從草其蓐字從衣者蓋是通用也羈鞅羈居宜反鞅於兩反王逸注楚辭曰羈謂絡鳥頭也謂靳牛頸繩也周挍周匝莊挍故言挍也四維廣雅曰維隅也隅即角也玩好之物死五𫨻反孔安注書曰玩戲弄也謂戲弄之具等祐一切鄭注禮云等齊也周禮曰祐助也普皆齊等以福助之祐字古作佑闍二體也頗有頗普歌反廣雅曰頗少也少猶希也有呼頗音為叵者甚誤因陀羅尼羅因陀羅者此云帝也主也尼羅青也此寶青色寶中最尊第一故曰青主也分敷布濩濩音護顏注漢書曰布濩猶言布露謂於露之處皆遍布也芬敷如上漢字經本從言作者也辨析扸蘇歷反漢書音義曰辨別也析分也析字有作扸者俗也深入法旋澓旋徐攣切澓浮福反切韻稱旋洄也三蒼曰澓深也謂深水下有深穴則令水有洄澓也經本旋字從方者音徐緣反切韻稱還也行至楞伽道楞伽者具云楞求羅伽西域山名在南天笁南界近海岸也激電激經歷反説文曰激疾波也謂電光急速如波迅速也剎那羅婆牟呼栗多仁王經云九百生滅為一剎那九十剎那為一念業俱舍論等謂時之最少名一剎那一百二十剎那名一怛剎那六十怛剎那名一羅婆三十羅婆名一牟呼栗多三十牟呼栗多為一晝夜也國名達利鼻荼荼除如反其國在南印度境此翻為銷謂此國人生無妄語出言成呪若鄰國侵迫但共呪之今其滅亡如火銷膏耳伽此云能降伏或翻為曇也經卷第六十三入法界品之四市肆崔豹古今注曰肆陳也謂陳鬻物善財言唯唯營癸反孔安注書曰直曉不問曰唯也鄭注禮曰唯恭於諾也謂諾然教許遽即下遽梁預反賈注國語曰遽疾也玉篇曰遽急也則為不斷為于危反廣雅曰則即也為猶是也下諸問並準此菩薩為一切衆生恃怙恃時止反怙胡古反韓詩傳曰無父何恃恃負也無母何怙怙賴也案經義菩薩於衆生如父母慈威兼濟常為倚賴也長者風俗通曰春秋之末鄭有賢人著書一篇號鄭長者謂年長德艾事長於人以之為長者故也涕泗悲泣涕音體泗音四毛詩傳曰自目曰涕自鼻曰泗也崔時注漢紀曰淚下無聲曰泣也拔猶豫箭邇雅曰猶狩名也其形似麂善登木性多疑慮常止山中忽聞有聲恐人來害即豫上樹久無方下須又上如此非一故時謂不決多猜慮者為猶豫焉或曰隴西時俗呼犬子為猶犬隨人行喜預在先未至却來迎候因謂心所不決為猶豫也今案論中猶豫即是疑煩惱攝而於善品不能進修故此須拔者也坦蕩自心論語曰君子坦蕩蕩小人長戚戚鄭玄曰坦蕩寬貌戚戚多憂懼也有一國土名摩利伽羅未譯也梵行之道梵摩具云毗澄摩此云清淨也又葛洪字𫟍云梵淨也衝昌客反優婆夷名休捨休捨具云呼舍羅此云悕望亦曰意樂或曰滿願謂滿衆生悕望意樂故也咨嗟戀慕咨音咨孔安注書咨嗟也玉篇曰咨嗟嗟歎也鄭箋詩曰咨嗟歎美之深者想其容止容謂容儀止謂行止經卷第六十四入法界品之五善知識者是我師傅府遇反師傅者尚書云周官有三公三孤言三公者謂太師太傅太保師謂天子所師傅謂傅相天子保謂保安天子於德義此三公之位佐王論道以經緯國事如理陰陽有德行者乃堪之也三孤謂少師少傅少保孤特也言卑於三公尊於六卿特置少三人也玉篇曰傅猶於附如以脂粉塗附於面益乎姿質也今案所喻踓舉師傅義通於保謂求道者得善友益己猶天子之有三公三孤佐弼之也毗盧遮那摩尼寶此云光明遍照如意寶也鳬鳬快趺反似鴨而小謂之危也俱抧羅鳥抧經以反其鳥未譯寶多羅樹多羅樹者形如此方棕櫚樹其繁密此中然是勝寶所成也徐搖徐緩也搖動也挾閣挾弦頰反阿盧那香阿盧那者此云赤色也挂古賣反又作挂釧昌戀反耳璫璫得郎反釋名云穿耳施珠曰璫也婆樓那天佛婆樓那者此云水也國土名那羅素那羅素者此云不懶墮也仙人名毗目瞿沙毗目瞿沙具云毗沙摩為多羅菩提瞿娑言毗沙摩者此六無怖畏也烏多羅者最上也菩提瞿娑者出聲也鮮榮鮮新然反玉篇曰鮮是明也釋名曰榮猶榮榮然照明之貌也波吒羅樹其樹正似此方揪樹也然甚有香氣其花紫色也尼拘律樹其樹如此方柿子似枇杷子子承蒂如柿然其種類耐老諸樹中最能高大領徒一萬孔安注書曰徒衆也司馬彪注莊子曰徒謂弟子也編草編蒱典反倉頡篇曰編識珠藂曰取物交織謂之編也字又作辮也髻環垂環謂髻如環垂環至故云也夷險道孔安注書曰夷平也方言曰險高也險易易羊豉反玉篇曰險難也郭璞注邇雅曰易平也言道路或險或平阿𢈔多𢈔逾主反阿𢈔多者當此方兆之名也那由他或曰那𢈔多當此方一億名也聚落名伊沙那伊沙那者此云長直也離諸難難上難字那翰反習八難也下難字者那乾反謂艱難之也伊那跋羅龍王伊羅者樹名此云臭氣也跋羅此云極也謂此龍往昔由此極臭樹故致頭上生此臭也因即以為名耳難陀優波難陀難陀此云歡喜也優波此云近也經卷第六十五入法界品之六口丹潔如頻婆果丹赤也潔淨也頻婆果者其果似此方林檎極鮮明赤也於河渚中渚支與反邇雅曰水中可居者曰洲小洲曰渚小渚曰沚小沚曰坘人所居者曰潏沚者止坘音遲橘字決述二音商估估公戶鄭注周禮曰行賣曰商坐賣曰估估字又作賈也貯張呂反福德淵淵烏玄反説文曰水洄曰淵毛詩傳曰淵深也今謂福德深奧也挍飾莊挍為飾故云挍飾也鵝王羽翮翮莖隔反珠叢曰翮謂鳥羽之本也憩止憩去例反珠藂曰憩息也稟善知識稟彼錦反孔安注書曰稟受也字從來稟聲古文作稟也靡不周贍贍市熖反珠藂曰靡元文賈注國語曰周備也漢書音義曰贍足也經卷第六十六入法界品之七遊福德海遊似由以周二反説文曰浮於水上也今以喻言尓遽即往諸遽渠預反賈注國語曰遽疾也玉篇曰遽急也何緣致此清淨衆會致陟利反顏注漢書曰致謂引而至之也不憚憚唐翰反鄭箋詩曰憚難也謂忌難艱辛也難音那輸反雉揲崇峻雉重爾反揲徒協反公羊縛日五板為堵五堵為外百雉為城何休注曰二萬尺也周十一里三十三步二尺公侯之制也禮記云天子十雉蓋受雉之城千百七十雉子男五十雉天子周城諸侯千城千城者缺其南面以受過也杜注左傳曰堞女牆也崇高也揲字又作堞也風黃淡熱文字集略曰淡謂胸中液也騫師注方言曰淡字又作痰也辛頭波羅香辛頭者河名也謂即阿耨達池西面金牛口出水流入信度國者是也波羅云岸也謂其香生波河岸故以出處為名耳阿盧那跋底香阿盧那盧此云赤色也跋底者有也或云極也謂此香極有赤色堪以練緋色甚鮮明故因名耳烏洛迦旃檀香烏洛迦者西域蛇名其蛇常患毒熱據此香樹以身繞之毒熱便息故因名也或曰此蛇最毒螫人必死唯以旃檀能治故以為名耳城名多羅幢多羅者義翻為明淨謂如星之明淨或曰精等明淨也謂昔有王名明淨眼幢創建此城故從之立名耳怡暢心怡與脂反毛詩傳曰怡恱也漢書傳曰暢通也撫其孤弱撫赽禹反漢書集注曰撫慰也鄭注周禮曰撫安也杜注左傳曰撫恤也阿那羅王此云無猒足也或曰普可畏聲言其王可畏聲名普遍諸國也以為其臍臍字冝從肉經本有作齊者也十万猛卒卒作沒反方言曰南楚東海之間呼人給事者謂之卒也楄方緬反字冝從衣作攘臂瞋目攘如羊反孟子曰臂而下車𮨇野王曰攘謂除去衣袂而出臂也㭈音勵反弟也挑天雕反曾不𮨇懼廣雅曰𮨇眷也言不眷戀身命怖懼死也命之同坐廣雅曰命呼也承旨玉篇曰旨意也富贍斷其所作斷都管反説文曰斷截也安注書曰斷絶也靡不該練珠藂曰靡無也廣雅曰該咸也包也小雅曰該備也珠藂曰鎔金曰鍊煮絲令熟曰練也該字又作晐練字鎔金從金煮絲或從散水也伊羅婆拏大象王伊羅謂伊陀羅即帝釋名也婆拏云出聲也言此大象時出美聲娛樂帝釋也或曰伊謂能出也羅婆拏聲也娛樂如前説也修臂毛詩傳曰修長也案玉篇修飾修長字昔從彡唯修脯字從肉也如漁漁御居疑據二反説文曰漁捕魚也字又作漁三形者也托動托呼高反攬也城名無量都薩羅都薩羅者都謂都羅此云喜也薩羅者此云出生也言此城中出生無量歡喜之事故名之經卷第六十七入法界品之八廛店鄰里廛除連反鄭注禮曰廛謂市物𨚎舍也謂停估客坊𨚎尚書大傳曰八家為鄰三鄰為盟二明為里五里為邑此虞夏之制也廛字經本從廠作者也巖巚巚魚偃反説文曰巖峯也郭璞注邇雅曰巖謂山形如纍重甑也字或作巘也鬻香鬻與六反玉篇曰鬻賣也賣鬻從每羹鬻從米摩羅耶山具云摩利伽羅耶其山在南天笁境摩利伽羅耶國南界而因國以立山名其山中多出白栴檀木香名先陀婆先陀羅此云石鹽其香似之故以名之耳船師名婆施羅此翻為自在也部多宮部多此云自生謂此類從父母生者名夜叉化生者名部多也晨脯尓雅曰晨早也玉篇曰脯加申也晷漏延促晷音輒李善注文選曰晷漏曰影也細分晷與漏別故周禮云表長八尺夏至曰晷長六寸日益兩晷益長也文字集略曰漏刻謂以筒受水刻節晝夜百刻也理斷斷都亂反鄭注禮記曰斷決也良久玉篇曰良由長也長對於促非暫時也國名輸那輸音冝借上聲呼正曰輸羅此翻為勇猛也城名迦陵迦林以義翻之名相鬪諍時此據因鬪諍建國立名也波利質多羅樹具云波利耶怛羅拘陀羅此云香遍樹謂此樹根莖枝花實皆香能遍熏忉利天宮迦鄰陀衣細綿衣也迫窄窄側格反玉篇曰迫猶逼也廣曰迫狹也窄隘也窄字經作迮者俗也婆樓那天此云水友也良田良善也顏注漢書曰溉灌也言其土地有溉灌利者也菴羅林菴羅果名狀貌似此土榛其味如梨也波須蜜多此云世友亦曰天友或云寶亦曰財也經卷第六十八入法界品之九脣吻吻無粉反蒼頡玉篇曰吻謂脣兩角頭邊也蹈彼門閫蹈徒到反閫苦本反説文曰蹈踏也閫門限也閫字又作捆也居士名鞞瑟胝羅此翻為纏裹也或曰包攝謂現廣大身可以含容國土也胝字上聲呼之勒具云昧怛𭌆曳此翻為慈氏也山名補怛洛迦此翻為小花樹山謂此山中多有小白花樹其花甚香香氣遠及也泉流縈映縈於營反珠藂曰榮卷之也字指曰映不明也案經意言泉流交給互相纏互相隱映故曰縈映也映字經本有作月邊英者蓋是胸臆樹林蓊鬱蓊鳥孔反玉篇口蓊鬱草木茂盛也蓊字漢書相如傳從竹下翁也遷移遷七延反鄭注禮曰遷猶變改毛詩傳曰遷猶去也城名墮羅鉢底此翻為門主或曰有門謂古者建立此城王之號也苦角反經本有作者元不是字之也迦毗羅城具云迦比羅皤窣都言迦比羅者此云黃色也皤窣都者所依處也謂上古有黃頭仙人依此處修道欲因名耳夜神婆婆演底具云婆傘多婆演底言婆傘多婆演底言婆傘多者此云春也婆演底主當也謂於春時此久主當守護衆生及諸苗稼也或曰婆羅婆薩那此云依止無畏謂與衆生作依止處令離怖畏又中天笁本云跋僧多云春主謂能生物善故借喻名耳佇立未久佇除呂反李善注文選云佇立貌也郭璞注尓雅曰佇企也謂舉足竦望有所敬時也方隅隅語俱反鄭玄注考工記曰隅角也方謂四方隅謂四維也慞惶慞諸羊反切韻稱慞懼也三倉曰惶恐也為作靈藥靈謂神靈也藤羅所胃藤但登反胃古泫反切韻稱卦也藤性緣物自織或羅也欲度溝洫溝古侯反洫許域反苞氏注論語曰方里為井井間有溝溝深四尺十里為城城間有洫洫廣深八尺之也令諸世事悉得宣敘小雅曰宣示也説文曰敘次第也言顯示得其次第也盜塔寺物塔具云窣堵波謂置佛舍利處也寺名依梵本中呼為鞞訶羅此云遊謂衆生共遊止之所也三蒼曰寺館舍也館舍與遊義稱相近耳又風俗通曰寺司也匡之有法度者也今諸侯所止皆曰寺也釋名曰寺嗣也治事者相繼嗣於內也今若以義立名則佛弟子助佛楊化住持正法同後二説若直據梵本對而翻則如初釋也夜久眠𥧌𥧌利反毛詩傳曰𥧌寢也玉篇曰寢謂偃臥熟也勸喻倉頡篇曰喻諫經卷第六十九入法界品之十遽發是念遽渠慮反玉篇曰遽急也被大精進甲被皮義反悉苦無味味猶樂也言皆是苦無可樂戀捶之藥反説文曰捶杖擊也案捶守説文從手玉篇從木聲類從竹耳其心泰然珠藂曰泰通也凡離憂塞者心則通暢耳為現不樂世間欲樂上樂字五教反下樂字郎各反嬰妄想漢書集注曰嬰繞也加也言為妄想之所纏繞也得此解脫其已久如久謂久近如何故維摩觀衆生品云舍利弗問天曰天止此室其已久如答曰如耆年解脫舍利弗言止此久邪天曰耆年解脫亦何如久今準此文如即是久近如何之問辭也嬪御有十億嬪婢人反賈注國語曰妄御曰嬪毛詩傳曰嬪婦也鄭注禮云嬪謂婦人有法度者之稱也周禮有九嬪教九御蔡雍曰天子九衣服加於身飲食入於口妃妾接以𮄊皆曰御御之所親愛則曰幸之也我時尋覺杜注左傳曰尋續也金剛臍佛臍字從肉經卷第七十入法界品之十一不藉耕耘而生稻梁耘于君反梁呂羊反毛詩傳曰耘除草也説文曰梁米名也耘字經本作藝者乃是藝薹菜字非此所用梁字或亦從禾也良臣猛將將即亮反諡法曰小心敬事曰良順理習善曰良今謂正耘存曰良絶謀而後勇曰猛將也中中張仲反於矯反孔安注書曰小曰夭也陵蔑他人蔑莫結反蒼頡篇曰陵侵也玉篇曰陵也鄭箋詩曰蔑輕也陵字説文單作麥又有從心作者俗通用也衆景奪曜説文曰景光也曜字又從光也大臣輔佐佐臧箇反鄭注禮曰輔助也佐副也言臣之於君有副助燮理之用無高倨心倨居御反杜注左傳曰倨鄭注禮曰倨不敬也經卷第七十一入法界品之十二受種種如來命鄭箋詩曰命教令也高七多羅樹多羅樹似此方棕櫚樹然西域者其高例十文餘故經中最為定量波頭摩花或曰鉢踏忙此翻為赤蓮花覺悟覺古皂反字又作窹經卷第七十二入法界品之十三蓮花覆合覆撫目反還也復也罷遊觀時罷蒱解反玉篇曰罷止也休也杵破杵昌與反打也字冝從手其掊杵字從木也苗稼不登馬融注論語曰樹五穀曰稼也小雅曰登升也謂穀則可升楊耳枯稿稿苦老反説文曰稿木枯也鄭玄注周禮曰稿木乾也稿正冝作稿其𣝩音苦到反杜注左傳稿乃勞義非經所用也衣裳弊𢙣弊毗例反説文曰衣敗為弊玉篇曰蔽與敝同杜注左傳曰敝衰壞也𭽫裂上七倫反下力哲反牀拓拓他盍反仁慈孝友釋名曰仁忍也好生惡煞善𢙣含忍也邇雅曰善事父母為孝善事兄弟為友也瞻奉撫對撫芳武反瞻視也奉承也漢書集注曰撫慰也恤也對謂抵對也佚佚夷曰反倉頡篇曰佚愓也樂也愓音蕩枯涸涸何各反廣匹曰涸盡也油雲柀八方孟子曰天油然與雲沛然下雨則苗浡然而長也毛詩音義曰油雲春雲也言能潤澤万物也大王臨庶品鄭玄注周禮曰臨謂尊適卑也賈注國語曰臨治也治謂治理也庶衆也品類也暴虐暴蒲報反玉篇曰暴陵犯也虐災也刑獄皆止措措倉固反鄭玄注考工記白措猶頓也置也置謂廢之也殘害顏注漢書曰殘謂多所煞也倉頡篇曰殘傷也忉也犬豚豚徒魂反方言曰豚豕子也僉然備命七廉反邇雅曰僉昔也小雅曰僉同也備具也入池自撫鞠鞠居六反王逸注楚辭曰撫持也鞠謂撮之也撮音括反鞠字正冝從手夜叉此云祠祭鬼謂俗間祠祭以求恩福者也舊翻捷疾鬼之也毗舍闍此云噉人精氣鬼也中霄中張仲反霄相遙反霄夜經卷第七十三入法界品之十四宿植植承力反倉頡篇曰植種也囹圄囹歷丁反圄魚舉反鄭注禮曰囹圄所以禁守繫者若今之刑獄也説文曰囹圄謂之獄名也榜笞榜蒲庚反笞勑之反字書曰榜捶也説文曰笞擊也榜字冝從手割蒲忍𭷀忍二反大戴禮曰人生暮而生然後行也説文曰膝骨也尚書大傳曰決關梁踰城郭而略盜者其刑𮨇野王曰謂斷足之刑即呂刑之剕周禮之刖類也字從骨經本月作作者俗也寬宥宥云救反杜注左傳曰宥赦也盜入宮闈闈于歸反尓雅曰宮中門謂之闈其小者曰閨小閨曰閣也王之寶祚祚字故反寶謂大寶書曰大寶曰位玉篇曰祚位也赫然大怒鄭箋詩曰赫然怒皂也毛詩傳曰赫赤也謂人大怒則面色赤也毀形降服降古巷反邇雅曰降下也謂下其好服又可著下𢙣衣服故也拘留孫具云羯羅迦寸地此云所應斷已斷或障已斷也薩遮尼𠃵薩遮此云有也尼𠃵者云尼𠃵連陀言尼者不也𠃵連陀繫也謂此類外道裸形自餓以為少欲不為衣食所繫故也御群生孔安注書曰御治也謂治理之也鄭注禮云御勸也謂勸化之也園林名嵐毗尼嵐盧含反或曰流尼此云樂勝圓光是昔天女之名因來此處遂以其處名耳經卷第七十四入法界品之十五被求一切智堅誓甲被皮義反著也傳來傳除緣反字從叀不從甫果從兜率玉篇曰果遂也定也坈坎塠阜坎口攬反塠都回反阜扶九反易曰坎陷也王逸注楚辭曰塠高土也邇雅曰高平曰陸大陸曰阜埠字又作堆耳瓦礫荊𣗥株杌礫零擊反説文曰小石曰礫也荊𣗥草穢通語也説文曰株樹根也杌謂剎去枝柯者也畢洛叉樹或曰畢利又此云高顯謂佛於降誕則為高勝名顯人天故曰高顯也有有處云佛於阿或迦樹下生者也諸佛臍中臍字從肉釋女瞿波瞿波或曰瞿夷此翻為守護地也經卷第七十五入法界品之十六愛念情至至猶極也為其安立為于偽反十方無間顏注漢書曰間空也謂無空隟之處也又音古間反文紀傳注曰容也謂更無有容受處也足趺隆起小雅曰隆高也身上分分苻閣反頰兼協反鮮白鮮相延反玉篇曰鮮明也睫煎葉反又作睫身上靡靡亡彼反漢書拾遺曰靡傾也傾謂偃臥也翊從翊以力反尚書大傳曰翊輔也毛詩曰翊敬也字又作翼翼與翊義古別今作翼洪纖得所纖相鹽反蔡雍注班固典引曰洪大纖細也修短合度修長也鄭玄注周禮曰度謂尺丈之數也言其長短合折中之節度先太子行先謂於先行也諷詠鄭注禮曰背誦曰諷也殞滅殞為愍反聲類曰殞沒也非其匹偶偶吾苟反毛詩傳曰匹配也杜注左傳曰匹敵也玉篇曰偶謂不羈隻也賈注國語匹偶對也玉篇曰耦對之耦從耒偶尓之偶從立人也暫時假𥧌寐蜜二反毛詩傳曰𥧌寢也毛詩曰假𥧌永勤箋曰不脫衣而眠謂之假𥧌玉篇曰假𥧌衣冠坐而眠熟也為誰守護護謂三護亦曰三監女人志弱故籍三護幼小父母護適人夫聲護老邁兒子護今此通問故言誰也監護之大經書懸合耳開剖剖潘補反玉篇曰剖破也倉頡曰剖折也巧斷斷都亂反冠以妙藏冠古亂反被以火焰被皮義反無譏醜鄭注禮曰譏呵察也毛詩傳曰醜𢙣也言可呵毀猥𢙣之事天繒纊繒疾綾反纊苦謗反説文曰繒帛也纊綿也小雅曰絮之細者曰纊也芬馨馨顯形反郭注邇雅曰芬謂香氣調和也説文曰馨謂香之遠聞也尊宿宿謂舊也下車步進王逸注楚辭步徐行也進向前也立佛支提支提者具云制底耶謂於佛闍維處置墳及安佛所説經臺閣之名也此翻為積集謂是人天積集無量福善之所也又或翻為生淨信處竟不可得鄭箋詩曰竟終也願得備瞻侍説文曰備具也𮨇野王曰備謂豫早為之也孔安注書瞻視也謂看視毛孔量量力仗反謂分位也經卷第七十六入法界品之十七禦扞禦魚舉反杆何幹反鄭注邇雅曰禦謂禁制之也杜注左傳曰禦正也杆修也蔽謂遮寒之也杆字聲類作捍也廓徹心城方言曰張小使大謂之廓也邇雅曰廓大也通俗文曰廓寬也説文曰縱通也此中經意謂以理融事小遍法界故曰張小使大嚴肅毛詩傳曰嚴威也肅綃也縮謂高浪者令縮退也言其有威德肅物也逐諸𢙣法玉篇曰逐驅也瑩徹心城倉頡篇曰瑩治也賈注國語曰徹明也説文曰徹通也今謂治理心城使其通達無所擁塞也部分心城分苻問反謂有部類有分齊者也羅剎鬼王羅剎具云羅剎娑此翻為可畏也言王者謂即毗沙門也悉達太子悉達者具云薩縛頞他悉地地字應平聲呼言薩縛者此云一切也頞他事也悉地成也言其於一切所應作事皆已成就也雖不踰本字林曰踰越也樓至如來樓至具云嚕支此翻為愛樂也造僧伽藍具云僧伽羅摩言僧伽者此云衆也羅摩院也營辦什物顏注漢書曰什物謂為生之具也三蒼曰什聚也雜也吳楚之間資生雜具通謂之什物有數十事物為什物者此蓋少知之説也拖馱之輕聲婆娑之上聲荼荼之上聲沙史我反縛房我反哆哆之上聲也夷我反娑娑之上聲麼莫我反衆峯齊峙峙持止反廣雅曰峙止也齊齊然止立也字冝從止者也伽伽之上聲輕呼他他之上聲奢尸何反借音也叉楚我反娑哆娑乘反哆當我反婆婆之上聲車昌野反娑麼娑乘我反訶婆並上聲呼縒倉我反伽伽之上聲吒陟加反拏搦可反娑頗娑乘反娑並二聲呼也娑也夷我反娑字上聲呼之侘耻加反咸綜無遺綜子貢反三蒼曰綜理經經謂整理經緯之都本也薀其深解薀於殞反杜注左傳曰蘊蓄也方言曰蘊積也馬融注論語曰薀藏也呪詛詛側預反鄭玄注周禮曰融謂柷使其敗露也痊愈痊七緣反愈逾矩反郭象注莊子曰痊謂病除也玉篇曰病差曰愈字又作愈也別知別彼別反珠貝案西域以貝為錢故列在寶類雞薩羅師子身毛施文呼為雞薩羅西域有寶旋文恰如師子毛旋形故從其為名耳也城名婆怛那具云難陀婆怛那言難陀者此云喜也婆怛那者增益也其城在摩竭國內如經本中説經卷第七十七入法界品之十八涸無量愛欲海廣雅曰涸盡也謂令其竭盡也杜絶諸𢙣道賈注國語曰杜塞也説文曰杜塞閇也説文字乃作也如濟客毛詩傳曰濟渡也案客謂寄居之稱故採樵寄山齊渡中水飲士寄醉賈人寄屋皆謂之客也重任重直勇反任如禁反傭作傭與恭反作則各反玉篇曰傭謂伇力也受直也穀梁傳曰作為也低下低丁奚反旃荼羅此云暴𢙣人也犗牛犗加邁反切韻稱犗犍牛也舟楫楫秦業資業二反通俗文曰曜謂之擑釋名曰擑值也撥水使舟倢疾也又案𢴧字不者戈音乃資葉反訓然義無別也良工良善也工枝也捃拾捃居韻居運二反漢書集注曰捃也王上字古亂反下字古端反耗耗呼告反滅也善知識之所致耳顏注漢書曰致謂引而至之也此善漁人漁語居語據二反工能於事曰善也説文曰漁捕魚也大篆字又作漁聲類作漁漁二體過爾焰海尓焰者此云所知謂智所知境非預識境由其轉若南聲為尓鹽故非轉毗若南聲也哽噎哽加杏反説文曰哽謂食內膏骨在喉內也悲憂咽塞者似其膏骨在喉故借喻言之耳自盈其手韓康注易云盈滿也經卷第七十八入法界品之十九曩於福城曩那朗反邇雅曰曩嚮也珠藂曰嚮謂往時也嚮音虛鞅反擐大悲甲擐胡串反杜注左傳曰擐貫也賈注國語曰擐衣甲也衣音意斷貪鞅鞅於仰鞅謂切牛頸下繩中以此繩不能重載凡夫田其貪之能斷生死之鞅繩也撒睡蓋撤除列褚列二反字書曰撤除也去也四流漂汩者汩榮筆反珠藂云汩流貌也又音古沒反尚書大傳曰汩亂也漢書集注曰汩流𢙣貌今取流急也飲以甘露飲於禁反飲飼水也住邪濟者毛詩傳曰濟渡也謂行異道如度者求於異淬故此借喻名耳曉誨説文曰曉説也音稅獷㑦獷古猛反㑦零計反坑穽穽疾政反鄭玄注周禮曰穽謂穿地為塹所以捕狩其超踰者則陷焉案籀文作阱蔽古文作棐者也苦的的謂準的鹿臍也篋牽協反鄭注禮記曰成私物函曰噬也貯陟呂反毗笈摩藥毗笈摩者此云普去謂能普去一切疾病也周給周匝供給故云周給利矛矛莫胡反兵仗仗除亮反風俗通曰仗者刀戟之揔名也鉗鋷鋷尼輒反玉篇曰鋷謂拔去睫髮也經本有作鑷者此乃車軸端鐵非經所用阿伽陀藥此云無病藥也謂有藥處必無有病也婆樓那風此云迅猛風也其風堅密如持世界風輪也毒不能中中陟仲反中猶者也大應伽藥應伽此云身身有四名一曰迦耶二曰沒理羅三曰弟河四日應加亦云分謂支分也藥樹名陀那陀那者此云和合或云續斷謂此藥能令已斷傷者再續和合也初無所言從初已來不增損也藥名阿藍婆此云汁藥其藥出香山及雪山中天生在石臼內或云得喜謂得此藥者皆生歡喜之者波利質多羅樹波利此曰遍也亦曰周匝質多羅云間錯莊嚴也言此樹泉雜色花周匝嚴飾或曰圓妙莊嚴也婆師迦花具云婆利史迦言婆利史者此云兩也迦謂迦羅此云時也西域呼夏為兩其花生於夏時故名也瞻蔔迦花此云黃色花有香氣而形似梔子花蘇摩那花此云悅意花其花形色俱媚令見者心恱故名之也海島島當老反孔安注書口曲謂之島説文曰海中往往有山可止曰島也揶子揶余遮反藥汁名訶宅迦此云金色水甚於九轉還丹之力者也燈炷炷之遇之𢈔二反筋居欣反字宜從肉經本有從角者謬也迦陵頻伽鳥此云美音鳥或曰妙聲鳥此鳥本出雪山在中即能鳴其音和雅聽者無猒也飛則徑捷徑甄盛反捷錢葉反説文曰徑強王逸注楚辭曰捷疾也徑字從力捷字本從人今俗也摩訶那伽此云龍亦曰象今此刀士力如龍象故其名也射師上食夜反摩竭魚此云大體也謂即此方巨鰲魚其兩眼如日張口如暗谷吞舟凡出海流如潮若欲欱水啓高下如山大者可長二百里餘也安繕那藥繕時戰反其色以青黛可以合和眼藥然今所明自據別法也延齡藥齡歷丁反邇雅曰近長也廣雅曰齡年也禮記曰古之謂年為齡也揳先結反案説文作捐古作相形者也漏所禁反水潛汝也字冝作參經本有從噪者音早非經所用也經卷第七十九入法界品之二十醉傲傲五告杜注左傳曰傲不敬也廣雅曰傲也案諸子書傲字皆從立人今有本從竪心者也陀那婆王阿修羅之別名未詳其義兜沙羅色具云兜沙兜羅色言兜沙者此云霜也兜羅求也或有經本云兜羅沙者準知也獄卒卒則沒反長者子瞿波羅案西方訓字瞿有九義此中但取地白義波羅此云守護也謂守護心地或守護白法也摩羅提國具云拘羅耶提數此云陀或曰摩羅耶者山名也提數中也言此國中央有摩羅耶山故因名也拘吒聚落具云拘吒迦此云小含或曰多家亦曰多多樓觀以此聚落中樓閣多也經卷第八十入法界品之二十一優曇花優曇此云希有也此花多時乃一開也儼然坐儼魚儉反加被被皮義反杜注左傳曰加益也孔安注書曰被及也謂以益相及也又珠藂曰從加恩謂之被也誓衆宣威誓謂戒誓主與軍旅為要約也故鄭玄注周禮云戒誓要之以刑也毛詩傳曰宣示也聽訟斷獄聽他寧反斷都亂反孔安注書曰聽謂察是非也周禮曰獄訟者聽而斷之鄭玄注云爭罪曰獄爭財曰訟玉篇曰斷謂裁制分決之也輔弼弼皮筆反尚書大傳曰天子必有四鄰前儀復丞左輔右弼直立而敢料廣心而從欲輔善而相承謂之輔廉潔而切謂之弼戴禮曰弼者拂拂天子之過常立於左潔廉而忉直匡過而諫邪謂之弼也阿迦尼吒天具云阿迦尼瑟吒天此云色究竟天也廣釋如上第二十二卷中霑洽廣雅曰霑漬也玉篇曰洽濡也濡潤也霑字或通作沾也炎熱炎丁嚴反尓雅曰炎熏也郭璞云早氣熏灼人也
