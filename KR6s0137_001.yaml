body:
  text: 京兆府靜法寺沙門慧菀述原夫第一勝義實離言之法性等流真教誠有海之方舟故以名句字聲作別相之本質色香味觸為住持之自體嗟乎超絶言慮之旨洽悟見聞之境莫不以法王𪪺造權道之力者歟大方廣佛華嚴經者實可謂該通法界之典盡窮佛境之說也若乃文言舛誤正義難彰真見不生尋源失路故涉近以經遠從淺而暨深去來今尊何莫由斯道且夫音義之為用也覽清濁之明鏡釋言詁之旨歸匡謬漏之楷模闢疑管之鈐鍵者也至如彽徊誤為遲回倣徨乃成稽返俾倪代乎隦堄軾環遂作女牆橋書矯形正斜翻覆幹存幹體樹木參差若斯之徒紊亂聲義不加踳駮何所指南苑不涯菲薄少玩茲經索隱從師十有九載雖義旨攸邈難以隨迎而音訓梵言聊為注述庶使披文了義弗俟籌咨細字知音無勞負𧙍且螻蟻之量司己穴而疏冥豈霆雷之資開蟄戶於遐邇英達君子希無誚焉經序音義天冊冊測革反說文曰𠕋符命也謂上聖符信教命以授帝位字或從竹或古為冊形也造化權輿造謂造作化為變化爾雅曰權輿始也言造作天地變化万物之始也天道日月星辰陰陽變化謂之天道易曰乾道變易是也龜龍繫象繫絃計反竟有神龜負園而出舜感黃龍負園而見也繫謂繫辭孔子述易十翼之二也人文易曰觀乎天文以察時變觀乎人文以化成天下男女君臣父子尊卑上下謂之人文也万八千歲按帝王甲子記云天皇氏治一万八千年地皇氏治九千年人皇氏治四千五百年有本云三皇皆治一万八千年同臨有截之區毛詩傳曰有截整齊也言四海之外率服截爾齊整也區謂區域也七十二君司馬相如封禪書曰繼韶夏崇號諡略可道者七十有二君管子曰昔者封太山禪梁父者有七十二家梁父太山下小山也禪音善也父者斧也人迷四忍人迷謂人人迷也四忍者思益經云一者無生忍諸法無來故二者無滅忍諸法無去故三者因緣忍諸法因緣生故四者無住忍無異心相續故也家纏五蓋家纏謂家家纏也五蓋謂貪恚蓋惛沉睡眠蓋掉舉惡作蓋疑蓋也鷲嵓西峙鷲巖謂靈鷲山也西峙者廣雅云峙立也謂彼鷲峯亭亭然止立於西域也超四大而高視老子云域中有四大謂天地王道也今言佛出過域內故云超四大也混太空混胡本反按說文混謂混沌陰陽未分共同一氣之貌今此謂花嚴法門量同太虛也字又作渾也叨承叨他勞反韻普稱叨忝也此言自謙狠厚承授記也玉扆扆依豈反鄭玄注禮曰扆屏風也以玉飾扆謂之玉扆也珠藂曰天子施扆於戶牖以為障蔽也海晏晏於諫反說文曰晏安也言其遠近清怗故曰河清海晏也殊禎禎陟盈反說文曰禎祥也蒼頡篇曰禎善也貝牒貝北蓋反牒徒頰反貝謂貝箋樹葉意取梵本經也牒謂簡牒即經書之通稱也時臻歲洽臻側詵反洽侯夾反時謂時時歲謂歲歲韻譜積臻至也說文云洽霑及也越漠漠謀各反漢謂沙漠言諸遠國超越沙漠來歸獻也獻賝賝勑林反玉篇曰賝寶也字或從玉架險𮎃深𮎃何剛反架謂置物在高懸虛之上也說文曰𮎃方舟也言遠國來者莫不登渡深險也罄牽定反毛詩傳曰罄畫者也挹因入反珠叢曰凡以器斟酌於水謂之挹今謂以心測度於法亦謂之挹也罕測罕希也測度也窺覦窺遣規反覦𢈔俱反左傳服處曰窺謂舉足而視也珠叢曰覦謂有所冀望也今言二乘之人於此法中意絶希望也隆鄭玄注禮曰隆盛也多也隘於懈反狹也肇持繞反始也爰毛詩傳曰爰為也凡為於事皆謂之爰緬惟上演反賈逵注國語曰緬思貌也啓開也粵以于月反發言之端也筆削漢書衛青霍光傳曰削則削筆則筆音義曰削謂刪去筆謂增益也有云治書勘校削而注也謂筆削也覃爾雅曰覃延也郭璞曰謂蔓莚枝相及也式杜注左傳曰式用也繕視戰反說文曰繕補也珠藂曰凡治故造新皆謂之繕也廓法界之疆域方言曰廓謂張小使大也鄭玄注周禮曰疆猶界也毛詩傳曰壃境也域營域也說文域封也珠函之祕珠謂如意寶珠也喻般若也函謂函篋此喻佛身也謂般若在佛身中猶如意珠在函也祕謂祕奧即般若也故大智度論第六十四云般若是如意珠佛舍利是函篋舍利中雖無般若而為般若所熏成故故得供養也祕字有從未作者音蒲結反乃是香草也十方漢書集注曰滿也三復復房福反鄭箋詩曰復謂反覆也珠藂曰復謂重審察也字又作覆也經卷第一世主妙嚴品之一摩竭提國摩竭提者或云摩伽陀或云摩揭陀或云墨竭從此之多名由依八轉聲勢呼召致異也其意義大略不殊或有釋云摩若不也竭提至也其國將謀兵勇鄰敵不能侵至也又有云摩遍也竭提聰慧也言聰慧之人遍其國內也又有云摩大也竭提體也謂五印度中此國最大統攝諸國故名大體也又釋云摩無也竭提害也言此國法不行刑戮有其犯死罪者送置寒林耳阿蘭若法若然也反阿蘭若者或曰阿蘭耶正云阿蘭𭫲此翻為無諍聲然有三類一名達摩阿蘭若即此所無明者也謂說諸法本來湛寂無起作義因名其處為法阿蘭若處此中處者即菩提場中是也二名摩登伽阿蘭若謂冢間處要去村落一俱盧舍大牛吼聲所不及處也三名檀陀迦阿蘭若謂沙磧之處也磧音遷歷反菩提場中菩提者此云覺也場者漢書音義曰築土而高曰壇除地平坦曰場斯皆神祇所遊止也場字有作場者謬也正覺按諸字書覺字從學學字從教教字從孝孝字從交因聲義轉相生也摩尼正云未尼未謂未羅此云垢也尼云離也言此寶光淨不為垢穢所染也又云摩尼此曰增長謂有此寶處必增其威德舊翻為如意隨意業逐義譯也雨無盡寶雨于句反光茂茂莫搆反尓雅云木如松柏曰茂郭璞注曰謂枝葉婆娑也漢貴音義曰茂美盛也一切說文云一切普及曰普即遍具之義故切字宜從十說文曰十謂數之具也有從七者俗也琉璃為幹幹哥且反琉璃梵言具云吹琉璃耶此名不遠山謂西域有山去波羅奈國不遠此寶出彼故以名之幹者字書云幹枝也謂枝也字冝從千經本有從木者謬也孔安注書杜注左傳及勘玉篇皆以從干為樹枝從木為築牆椽板謂即兩當頭者謂之楨兩旁者謂之幹也寶葉扶踈扶服無反漢書音義曰扶踈分布也說文曰扶踈四布也扶字玉篇在木部經本從手作者謬也嚴麗王逸注楚辭曰嚴莊也小雅曰麗著也萃影萃疾醉反易曰萃聚也詩傳曰萃集也纓絡經本有作瓔珞二字並謬也瓔謂似王之石音與櫻同非此用堂榭榭徐夜反尓雅曰闍謂之臺有木謂之榭郭璞注云謂臺上起屋也杜預注左傳曰榭謂屋歇前也言土臺上有歇簷之屋并有樹木者也闍音都字從木也階砌戶牖砌千計反牖以柳反玉篇曰階謂登堂之道即級道是也廣雅曰砌祀也謂即夾級道兩邊平面砌石也說文云在屋曰窗在牆曰牖戺音仕也備體劉兆注儀禮曰備畢盡也言盡體嚴之也瑩燭瑩高定反廣雅曰瑩摩也謂摩拭珠玉使發光明也蒼頡篇四燭照也言相照發光也妙音遐暢無處不及爾雅曰遐遠也廣雅曰暢達也及至也威光赫奕赫許格反奕移益反廣雅曰赫赫明也奕奕盛也奕字經本有從廾作者薄奕字也靡不咸覩靡亡彼反珠藂曰靡無也視視也不思議劫劫梵言也具正云羯魔波此翻為長時也金剛藏美反按此中梵本是肚字冝從肉經本作齊者乃是齊等之齊非此所用也毗盧遮那按梵本毗字應音云死廢反此云種種也盧遮那云光明照也言佛於身智以種種光明照衆生也或曰毗遍也盧遮那光照也謂佛以身智無㝵光明遍照理事無㝵法界也尊嚴珠藂曰尊可敬也鄭玄注禮曰嚴可畏也毛詩傳曰嚴威也那羅延此云堅國須光梵須具云蘇迷盧此曰妙高梵亦梵言具云梵摩此翻為清淨旃檀此云與藥謂白檀能治熱病赤檀能去風腫皆是除病身安之藥故名與樂彩雲尚書曰以五彩彰施於五色𮨇野王曰彩猶色彩色之雲故曰彩雲櫂幹櫂除覺反許重舛注淮南云櫂引也引謂引出字林曰幹枝也逈曜逈胡𤈍反尓雅曰逈遠也仁慈祐物祐尤教反孔子述易曰祐者助也物謂有情命者也言能以利樂事濟助含識也祐又作佑闍主稼神稼加噉反廣雅曰主守也馬融注論語云樹五榖曰稼言五榖苗稼植之在田此神守護不令有也滋味上子之反蔣也液也旨也此神能益滋味令成熟也環髻環胡關反旋澓澓扶福反三蒼曰澓深也謂河海中洄漩之處是也樹杪抄小反方曰杪木細枝也郭璞曰杪言梢也阿修羅或云阿素羅阿此云無也素極也妙也羅戲也言此類形雖似天而無天之妙戲按婆沙論譯為非天以此類雖天趣所攝然多諂詐無天實德故曰非天如人行惡名曰非人舊翻為不酒者譯人謬也謂梵語中𡨔唎名酒而與素羅聲近即訓阿字為不故云不潤斯乃失之甚也按梵本中阿素羅是多聲呼之阿素洛是少聲呼之然皆同一猶謂也羅睺睺胡鉤反羅此云攝睺云惱也謂此修羅能隱謂日月光明令中諸天生苦惱也或曰羅虎那此云名普間謂日月普天照臨此既蔽之故天下聞其名毗摩質多羅毗摩此云絲也質多羅此云種種也謂此修羅善於幻術能以一絲幻作種種事也又云毗摩此曰遍空質多羅此云種種嚴儀言此修羅與帝釋戰時嚴備種種軍伏之儀遍空而列也舊云嚮高或曰穴居者非敵對翻也迦樓羅或曰揭路茶此云食吐悲苦聲也謂此烏凡取得龍先內素中後吐食之其龍猶活此時楚痛出悲苦聲也或曰此云大嗉項鳥謂此鳥常貯龍於嗉內益出項粗也舊云金翅妙翅者且就狀而名非敵對翻也然其翅有種種寶色非唯金耳緊那羅緊此云疑也那羅云人也謂此神㒵似人然其項有一角令見者生屣云人耶非耶或曰那羅此云丈夫也緊云猶豫也以其形㒵如人而口似牛使見者生疑故名也舊云歌樂神者從技翻也摩睺羅伽摩睺此云大也羅伽云胸腹行也此於諸畜龍類所攝舊云蟒神者相似翻名非正對也夜叉此云苦活或曰祠察叉云捷疾今取初釋毗沙門具正云鞞室羅蔥囊此云多聞謂此王福德多處知聞也或曰毗遍也沙門聞也謂諸處遍聞義同前釋或曰毗云伊也此王本名俱乞羅後於一時佛正為衆說法其王乃披袈裟來入會中時衆咸怪㸦相謂言伊是沙門伊是沙門從此與號毗沙門也器仗仗直亮反風俗記曰伏者刀戟之惣名也毗樓義具云髀路波呵迄義言髀者種種也路波者色也呵迄又者根也謂以種種雜色莊嚴諸根也又言躰種種也路色也波呵迄又目也言其目種種色莊嚴舊云醜目者也娑竭羅此云海也德叉迦此云能害於所害也謂德又是所害聲迦是能害聲言此龍德時噓視人書皆致終也舊云多舌龍者由多言故名多舌非是口中有多舌也鳩槃荼此云陰囊亦曰形卯謂此之類陰囊狀如冬苽行時擎置肩上坐時即便據之由斯蔽狀特異諸類故從之為名舊云冬苽者以其猥而不顯故使人解耳𠃵闥婆此云食香或曰尋香言此類尋逐食之香氣往彼設樂以求食也舊云樂神者非正翻也釋迦因陀羅釋迦正云鑠羯囉此云帝也因陀羅此云主也古來釋同佛族望之稱之深也須夜摩須善也夜摩時也言彼諸天光明赫奕晝夜不別但看花開合以分其時既非明暗之時故曰善時天也兜率陀具云兜率陀此曰喜樂集依俱舍論中有三義得此名一喜事二聚集三遊樂舊翻為喜足或曰知足非正翻也華蘃如籌反玉篇曰藥謂花鬚頭黑也字從三心有作三止者不是字也尸棄具云尸棄都此云有髻或曰頂髻也經卷第二妙嚴品之二為啓難思說文曰啓開也陀羅𡰱此云惣持不唐捐捐與專反唐虛也捐棄也無倫匹玉篇曰倫類也匹比也悟斯道邇雅曰斯此也十力摧唐顯反邇雅曰滅也曩那朗反尓雅曰曩久也謂久遠也心馳蕩馳直知反蕩唐朗反廣雅曰馳奔也說文曰蕩放恣也蕩字正作惕經本作蕩者時共通用古體又作婸𢠽二躰也不隨魔魔梵言也具云魔羅此云障㝵善或曰破壞善也誘誨說文曰誘教也劉獻注易曰晦示也俾無癡惑俾卑爾反孔安注書曰俾使也益其精爽劉獻注易曰精靈也說文曰爽明也言增益心靈使明利經卷第三妙嚴品之三蔭澤蔭於禁反滋榮韻圃稱滋潤也釋名曰榮榮然照明之㒵言其先潤者也滌除滌曰歷反說文曰滌洗也慰安慰於謂反漢書云應劭注曰由上撫下曰慰下得上慰曰安也一𠛴𨚗中𠛴𨚗者時之極促名也人王經云一念中有九十𠛴𨚗一一𠛴𨚗有九百生滅又俱舍論云百二十𠛴𨚗為一怛𠛴𨚗六十怛𠛴𨚗為為一臘縛三十臘縛為一須三十須為一晝夜三十晝夜為一月十二月為一年也癡翳常蒙惑翳於許反方言曰翳薆也珠叢曰蒙蔽也文字集略四翳目障也公羊傳曰眼有眸子而無見曰蒙也言癡為患眼之障蔽不見真理故常生疑惑也翳字又作翳蒙言愛也漂淪淪力勻反玉篇曰逾沒也畏塗塗道也謂三𢙣道可怖畏故名之畏塗也大名聞聞無運反珠藂聲謂名聲復有此言准釋之也其聲所暨暨渠肆反杜注左傳曰暨及也無央數央於良反王逸注楚云央盡也决定决字從兩點不從水其從水者乃是水行之决字也叵思議叵普我反字書曰叵不可也世閒共度度唐洛反𠕀不均邇雅曰𠕀無也一切智道靡不宣珠叢曰靡無也邇雅曰宣示也示謂顯示又云明也明謂分別又云遍通也施行也婆稚正云末梨此云有力苫末羅西域近海岸邊樹名此翻為黃雜色金翅鳥若來即居其上也曠劫曠苦謗反廣雅曰曠久也謂久遠者也淪永夕廣雅曰淪沉也邇雅曰永長也夕夜也言死界中常癡暗故謂之長夜者也尸利夜神此云普現吉祥法炬炬渠與反說文曰炬謂束薪而灼之謂大燭也珠叢曰苣謂莒苣束草火以照之也苣即古之炬字莒音居呂反克克肯勒反邇雅曰克能也滅也經卷第四妙嚴品之四牟𡰱此云寂然也佛𠛴𠛴具正云差怛羅此曰土田也差音初界反無猒足猒於鹽反飽也朗然說文曰朗明也罣礙罣胡卦反字略曰罣謂㝵也字又作罫也三昧具正云三摩地此曰等持謂離沉掉名之為等令心住一境性故曰持也泉澗澗古鴈反霈澤清炎暑霈澤普蓋反文字集略曰霈謂大雨也劉賾注孟子曰霈然注雨㒵郭璞注邇雅曰炎謂羊氣熏灼人也說文云暑熱也難宣小雅曰宣示也恬怡最勝道恬徒嫌反怡以之反孔安注書曰恬八安也邇雅曰恬樂也蠲除蠲古玄反小雅曰蠲潔也潔謂淨潔之也皆從化鄭箋詩曰從謂也珠叢曰教成於上而易俗於下謂之化也險詖不修德詖彼義反毛詩序曰內有追賢之志而無險詖之心蒼頡篇曰詖謂侫諂也無猒怠猒於焰反倦也踰須彌字林月踰越也如世生盲卒無覩卒將聿反竟也終也如盲𥌒鼓公五反三蒼曰無目謂之𥌒釋名曰𥌒謂眠眠目平合如𥌒皮也字從皮也綸綸力脣反漢書拾遺曰綸猶纏裹也言周匝包羅耳名譽譽余茹反毛詩傳曰譽謂人美稱揚也明矚矚之欲反韻略曰矚視也經卷第五妙嚴品之五如川鶩鶩無羽反漢書音義曰鶩亂駝也謂因歷事元無邊佛海今坐道場竟奉如百川之奏海耳金剛字從肉無遺隱遺餘也隱藏也綺麗窗張載注靈光殿賦云綺文也小雅曰麗著也言窗有文彩照著者也特明顏注漢書曰特獨也填飾妙華填字正宜作瑱音唐見陟憐二反漢書訓慕曰瑱謂珠玉壓座為飾也周禮有瑱圭長尺二寸王所雜飾也今經本從土作者音唐賢反乃是填塞之填字耳也夷坦夷以脂反他懶反毛詩傳曰夷易也謂簡易之道言省力易行者也廣雅曰坦平也光瑩鄭棧詩曰光瑩也切韻稱瑩飾也言以名花妙實瑩飾於佛座也又按說文字統瑩又作鎣訓與瑩同然別有音余傾反訓為光飾之義近代以來碩學絶嗣聲義渾雜濫以管音之訓安瑩聲之下也世尊凝睟睟宣醉反易云君子以正位凝命王弼注曰凝者嚴整之㒵睟視也謂肅然而視也又孟子曰睟面色潤也睟然潤也玉篇曰澤之㒵也炳然炳彼永反蒼頡篇曰炳明著也門闥闥他達反漢書集注曰闥小門洞啓洞徒弄反玉篇曰洞達也棟宇棟都弄反郭璞注雅曰棟屋𬃡也𬃡於靳反𬃡即齊也妙香氛氳氛符云反氳於云反王逸注楚辭曰氛氳盛也香氣盛也二字又作葐蒀也樹歧歧矩羈反兩股間也柣字書作岐謂枝橫首也今經本有從山邊作支及切韻音為歧並誤爭聳擢聳息勇反擢直角反切韻稱聳高也蒼頡篇曰擢抽也言抽樹枝條高上也如重雲重直用反言密聞也覆覆芳富反漢書音義曰彌滿也言遍滿覆蔭也相庇映庇卑至反鄭玄注禮記曰庇覆也邇雅曰庇廕也字漢書映俞照也彩間也言相庇相映如五彩之綺鐟也映字古正體作當日中央為映有從日邊作英者謬之也經卷第六如來現相品閻浮檀金具正云染都捺陀此是西域河名其河近閻浮捺陀樹其金出彼河中此則因樹以立稱金由河以得名或曰閻浮果汙點物成金因流入河染石成此閻浮檀金其色赤黃兼帶紫焰氣也優鉢羅華具正云尼羅烏鉢羅尼羅者此云青烏鉢羅者花號也其狹長近下小圓而上漸尖佛眼似之經多為喻其花莖似藕稍有㓨也頗梨色正云窣堵致迦其狀少似此方水精然有赤有白者也普振振字正宜作震動之義經太作據字者乃是根舉之振也辟支佛地辟支梵言具云畢勤支底迦此云各各獨行佛者覺也舊翻為獨覺正得其意或翻為緣覺譯人謬以梵語云鉢羅底迦此翻為緣故智度論第十八中通上二類也僉然坐僉七鹽反邇雅曰僉皆也邇雅曰僉同也如云莫不皆然也克證邇雅曰克能也法界周流無不遍周匝流布故曰周流或覆或傍住覆芳福反傍薄即反周聞十方聞無運反鄭注禮記云周遍也珠叢曰聞聲所至也經卷第七普賢三昧品包納包字又作苞並通用也般涅具云般利涅𨚗謂般利普也究竟也涅出離也𨚗煩𢙉結也言諸煩惱結普究竟出離也我曹如淳注漢書曰曹輩也世界成就品志欲廣大論語注曰志暮也慕謂希樂者也煩惱擾濁擾如紹反孔安注書曰擾亂也字宜從憂憂音奴刀反經本從憂者謬也或修或短廣雅曰修長也經本作修字者謂乾脯之修非此用也懸覆住覆孚福反倒垂狀也㸦偱復偱祥倫反復符福反郭璞曰偱謂巡行也鄭𤖆詩曰復謂覆也言經歷往來也無暫已已余里反廣雅曰已止也三維及八隅廣雅曰維角也鄭玄注考工記曰隅角也共美共字從草不從廾撗盡必須連美字從大必不得從火也一一區分馬融注論語曰區別也迫隘隘於懈反迫迮也隘狹也經卷第八華藏世界品之一草羅生悉芬馥芬孚云反馥符福反邇雅曰美也賈逵注國語曰寶也謂以寶為草楚辭曰羅生乎堂王逸注曰羅謂列而生也不可沮壞沮才與反漢書音義曰沮毀也澄垽其下垽魚靳反邇雅曰澱謂之垽郭璞注曰潀滓也江東呼為垽也欄楯欄勒丹反楯述尹反說文曰欄檻也王逸注楚辝云縱曰攬撗曰楯楯閒子謂之櫺也芬陀利此云白蓮花亦曰百葉花也尸羅幢按梵語云陀羅此曰清涼若云試羅此翻為王謂以王為幢名尸羅幢也𥪰奏小雅曰奏進也為也香水澄渟渟笛零反埤蒼曰水曰渟渟猶湛也經本有從立人作亭者誤也垣牆繚繞垣于元反繚離鳥反毛詩傳曰垣牆也說文曰繚纏也謂周匝纏繞也牆字籍文隸文皆為牆今或加土者也洄澓洄漩也澓深也謂河海中深淵之處水旋轉也壇墠形墠常演反尚書曰為三壇同墠孔安注曰築土為壇除地為墠韓詩傳曰墠猶坦坦言平地也佉勒迦形佉勒迦此云篇也因陀羅此云帝也娑婆此云堪忍字之形今按梵本字乃是德者之相元非字也然經中上據漢本惣一十七字同呼為万依梵文有二十八相即八種相中四種相也謂室利靺瑳難提迦物多塞囀悉底迦本囊伽吒又有鉢特忙研訖羅跋折羅等三相雖於花嚴回向二品中有以其可識無謬故此不列在數又有盎句奢相此經惣無故亦不列其一十七相既非万字又非一毛之相今顯異異同謂第八卷有一室利靺瑳相第九卷有三相勑難提迦物多次室利靺瑳後亦室利靺瑳第二十三有一相謂塞轉悉底迦苐二十七有五種相初室利靺瑳次塞囀悉底迦次難提物多次室利靺瑳後難提迦物多第四十八有三相一塞囀悉底迦相二室利靺瑳三室利靺瑳第五十七五十八六十三六十五等各有一室利靺瑳相若謹依梵本捴有二十八相具顯如刊定記說也梵書字八圖狀應添畫之室利靺瑳此云吉祥海雲難提迦物多此云右旋本囊伽吒此云滿瓶或八相中無此瓶有螺鉢特忙此云赤蓮華跋折羅此云杵盎句奢此云曲鉤塞嚩悉底迦此云有樂斫訖羅此云輪經卷第九華藏世界品之二世界名尸利尸利此云殊勝亦曰吉祥城郭風俗通曰城之為言成郭之為言廓謂寬廓成受者狀如四洲尓雅曰水中可居之地曰洲今四天下皆在四大海中故俱名洲也言狀如四洲者東洲形圓如日西洲形如半月南洲北廣南狹北洲其形正方師子頻伸毛詩傳曰頻急也申舒也謂有勞倦者以手足𦙄左右上下或急弩或舒展用自解其勞倦此或全是梵語如刊定記說也世界名多羅未詳龍淵淵烏玄反孔安國注論語曰淵潭也慣習慣古患反鄭箋詩曰慣習也字宜從手或有作串者乃是貫串字從今經本從堅心者俗通用也天城寶堞堞徒頰反杜預注左傳曰堞女牆也經卷第十華藏世界品之三䡄度度徒故反賈逵注國語曰䡄法也鄭玄注周禮曰度謂尺丈之數也言䡄儀有節故曰䡄度也佛號娑羅王娑羅此云堅固亦名最勝絶倫鄭玄注儀禮曰倫比也吉祥幄搓於角反尚書傳曰吉善也杜注左傳曰祥者吉凶之先兆賈注國語曰祥猶象也何承要曰在上曰帳旁日惟四合象宮殿謂之幄也崇飾寶隦堄隦普米反堄研禮反鄭注考工記曰崇高也廣雅曰隦堄女墻也蒼頡篇曰泥城上小垣也按賈注國語隦字作埤杜注左傳作卻廣雅作隦籕文作𩫝𩫝又音避支反今經本作俾倪字者按聲類乃是軾中環持蓋杠者也又有䫌及䑀腉之字並是左右傾首邪視也或云車中傾視於外也杠音江謂蓋竿也秀出秀私究反國語曰秀出於衆有則以告𮨇野王曰秀美也如衆繢繢胡對反鄭注論語曰繢畫文也劫燒燒書耀反堅硬硬顏孟反閻羅界閻羅具正云琰摩闍羅此云遮止謂遮止罪人不令更造也金剛杵杵昌與反海蚌蚌蒱項反蛤也字又作蚌也酸楚酸蘇官反說文曰酸酢也按楚猶齗也謂身受劇苦疼痛不可觸近猶齒之酸齗不可以近物也或曰酸猶於痠疼也楚荊杖也言被杖疼痛也又曰酸傷於骨楚猶齒齗言受重苦徹骨疼痛不可觸近也經卷第十一毗盧遮那品乃往說文曰乃語辝也廣雅曰乃往也重言訓義猶清淨也不可紀極紀居理反廣雅曰紀記也鄭玄注禮記極盡也言記之不可窮盡也𨚗由他按此方黃帝數法有三等若依下等當此非也中等栜也上等潛也具如下阿僧祇品處釋也從廣從紫容反孟康注史記曰南北為從東西為撗廣也從字正體從木有從糸彳作者皆俗通用樓櫓却敵皆悉崇麗櫓郎古反切韻稱城上守禦曰櫓也繞城往往別築回起土臺名為卻敵既高且飾故云崇麗也塹七焰反說文曰塹坈也經本有作從水者也波頭摩華正云鉢持忙此曰赤道也其花莖有㓨拘物頭華其花莖有㓨色或赤白以其花稍短未開敷時狀郁蹴然故亦或名小白華萃止毛詩傳曰萃集也城邑宰官左傳曰邑都也有先君宗庿曰都無曰邑也孔安注論語曰宰臣也韻圃稱宰主也謂城邑中長吏即為其主也四衢道尓雅曰一達謂之道路二達謂之岥旁三達謂之劇旁四達謂之衢五達謂之康六達謂之㽵七達謂之劇𩥵八達謂之崇期九達謂之達然以路多四達凡謂故多用也妓樂渠倚反切韻稱妓女樂也埤蒼曰妓美女也因以美女為樂謂之妓樂也經本有從手邊作支者此乃藝技字也或有從立人作者章易反傷害也非經意也巾馭汝寶乘馭魚據反乘食證反晉書與服志曰周禮巾車大赤以朝大白以成按巾謂飾也鄭玄注周禮曰巾猶衣也音於記反謂以繒緣衣帶有車也廣雅曰馭駕也夫人采女采擇所得之女謂之采女風俗通口六宮女凡數千人天子遣掖丞率於鄉中閲視童女年十三以上二十以下長壯皎潔有法相者因義入宮故謂之采女也夫人者按因夫以成故曰夫人也尋亦去世杜注左傳曰尋續也言續後去也聚落聚疾喻反韋昭漢書云小鄉曰聚人所居也又左傳曰聚衆也廣雅曰落居也衆所共居故稱聚落也依怙怙胡故反尓雅曰怙恃也韓詩傳曰怙賴也謂倚賴也經卷第十二如來名號品瞻葡華此云黃色花其花甚有香氣然以支子也阿耨多羅三𦴭三菩提耨奴沃反𦴭字按梵本應音云略反阿此云無也耨多羅上也三正也藐等三正也菩提覺也惣應云無上正等覺也耨字古來經論巾多作耨音奴攜反按梵語耨音同此方入聲殊無去聲之勢字冝從示不慮從來此乃古今鈔寫之無識非潤色之紕𦴭字本者摸角紹二反此土既無略之字故假借𦴭字而用之釋迦牟𡰱釋迦此云能也牟𡰱寂囉也言其三業離於喧雜也瞿曇氏具云瞿答摩言瞿者此云地也答摩最勝也謂除天以外在地人類此族最勝故云地最勝也或曰瞿曇或云憍曇或云瞿夷皆女聲呼之也醫羅跋𨚗醫者具云醫溼弗羅跋此云自在也羅跋那者大聲也謂佛號大自在聲修臂修相由反按玉篇修飾修長皆從攸或修脯從肉今有以脯修為飾長之用者並修修同從人彳豐溢夷曰反說文曰溢器滿餘也或名性超邁邁莫界反按梵本云遏底爛陀塞嚩皤婆言遏底爛陀者超過塞嚩自也皤婆性也謂自體性超過也說文曰邁遠行也遠即過遠也或名簡言詞簡皆限反尚書曰辭尚簡要孔安注曰簡略也鮮少鮮斯演反賣注國語曰鮮寬也寬猶薄也古躰正作鮮或俗作鮮形亦有用者𨷲餘灼反字又作籥鑰四聖諦品躁動躁則到反鄭注論語曰躁不安靜也仇對仇渠尤反尓雅曰仇讎也孔安注書曰仇怨也言集望於道如怨讎也障出離故也資待考子記曰資取也王逸注楚辝曰待須也言苦濟為飢渴寒熱等病所隨故有所須有所求取也鄙賤鄙悲几反如淳注漢書曰鄙猥陋也獷獷古撗反破於胤反言苦報盡處方顯滅諦故名滅諦為破或有經本而云破𡖉𡖉盧管反謂由破生死穀𡖉顯得滅諦故也能攫噬攫拘縛反噬常制反蒼頡篇曰攫搏也說文曰攫爪持也廣雅曰噬嚙也言田造集𡧱真實出離善根故此猶如師子搏嚙也攫字絙本有從立犬邊作矍者甚花嚴闍梨共三藏覆勘此梵本謂之似多此云師子然依業用聲呼故翻為攫噬其於犬邊矍者乃是猿猴之屬與梵本元不相當也噬字要冝從竹經本有從廾者音武俱反又有口邊著莖者元不是字也㕽音辝孕反二渾濁渾戶昆反切韻渾濁也重言訓義猶清淨耳壞普談反未燒反也憤毒憤夫問反賈注國語曰憤威也鄭注禮記曰憤謂怒氣充實也驚駭駭間階反廣雅曰駭起也失驚者其心必舉起故驚也匿疵匿尼力反疵疾移反廣雅曰匿隱也杜注左傳曰匿藏也疵病也言苦諦隱藏煩𢙉過患也傲慢傲五告反杜注左傳曰傲不敬也傲字經本有從豎心邊作敖者駃流駃所吏反蒼頡篇曰駃速疾也字從馬史聲經本有從馬邊决者音古穴反乃是駃騠馬名非此經意也經卷第十三光明覺品閻浮提正云贍部提贍部樹名也提此云洲謂昏山上阿耨池南有一大樹名為贍部其紫上闊下狹此南洲似彼故取為名弗婆提具正云布嚕婆毗提訶言布嚕婆者此云初謂日初出處此翻為東也毗勝也提訶身瞿耶𡰱具云阿鉢唎瞿陀𡰱言阿鉢利者此云西域曰鉢軌忙此云使謂曰沒邊處也瞿牛也陀𡰱貨也謂以牛買物如此洲用錢也鬱單越具正云殟怛羅句嚧言殟怛羅者此云上也勝也句嚧所作也謂彼洲人於所作事皆無我所勝餘三洲故也文殊師利正云𭦟殊室利言曼珠者此云妙也靈利德也丈夫大戴禮日大者長也夫者扶也言長制万物者也白𧆞通曰夫扶也以道披按也丈夫為言杖扶人者也左傳曰進賢達能謂之丈夫也廣雅曰男子之丈夫有名行者也紺青紺古暗反珠叢日深青之色而佯赤色者謂之紺也戲笑戲字虛邊作弋音餘力反笑字從竹犬聲有作笑者俗也寤世閒寤吾故反寤悟也謂令世閒皆出生死睡眠也塵纍贏僞及鄭玄曰纍係也謂六境汙心如塵坌人即此係縛不得出離故捴謂之塵纍也塵字從庶土庶衆也謂衆土所成塵會意字也今人多從庶下土為塵莫識其義也菩薩問明品曉悟群蒙廣雅曰曉說也鄭注禮記曰群衆也韓康注易蒙昧幼小之㒵說文曰蒙謂童蒙也言凡夫於道未有所識如幼童蒙菩薩說之令開悟也說音書𨦣反惟仁郭璞注尓雅曰惟發語聲辝也周禮曰天德曰仁言人有如天覆育之德者即謂之為仁湍流𥪰奔逝湍他官反說文云淺水流沙上曰湍疾瀕也尓雅曰逝往也瀨音賴也長風長直良反兼名苑云風暴疾而起者謂之長風者也鼓扇鼓公戶反鄭玄注儀禮云鼓猶擊也扇動攝也鼓字經本有從壴邊作皮者此乃鍾鼓之字機關木人韓康伯注易曰樞機制動之主也按機即樞機用資轉動關鍵遂在密能運言木人無心但以暗密繩楔而能運動今喻業體都無作者而能生起於果報從善角反鄭注尓雅曰謂鳥子須母飯者𩿿謂能自食者也字經本有從聲下作卯者無不是字尋茲𣧘起自無識胸遮製字陷誤童蒙耳濤波濤唐勞反三蒼曰大波為濤也阿揭陀藥阿此云普也揭陀云去也言服此藥者身中諸病皆除去也又云阿無也揭陀病也服此藥已更無有病故名之耳毗藍風正云吠濫婆言吠者散也濫婆者所至也言此風所至之處悉皆散壞也又云毗不也濫婆遲也謂此風行最極迅急也舊翻為迅猛風是也其水輪下風轉亦與此風輪同名也樵溼樵疾遙反溼失入反說文曰樵薪也溼字經本有作濕者音他合反此乃平原郡之水名耳如鑽燧鑽則官反燧徐醉反鑽謂木中取火燧謂鏡中取火也淮南子曰陽燧見日則焫而為火方諸見月則津而為水許叔重曰陽燧五石之銅精仰日則得火方諸五石之精作圓繫似壞仰月則得水此燧又作燧也赫日赫亨格反毛詩傳曰赫赤㒵也孩稚稚直履反方言曰稚年小也字又作稚也草箭草一名縈杜西域既自有之東江亦多此類其形似荻皮重若笋躰質柔弱不堪動用也其正宜作惹也射神亦反躡𡰱獵反踽也受餒餒奴罪反說文曰餒飢也字食妥聲經本有從食邊委者於僞反此乃餧飼之字也基堵堵當古反賈逮曰基始也公羊傳曰五板而堵何休曰八尺曰板一堵凡四十尺也今謂創始築牆基為宮室之本時也率土咸戴仰尓雅曰率從也玉篇曰戴謂欣奉於上也言從化之民莫不欣然奉事也經卷第十四淨行品奢摩他此云止息亦曰寂靜謂正定離沉掉也毗鉢舍那此云種種觀案謂正惠决擇也猗覺猗於宜反淹師文選音義云猗美也玉篇𮨇野王曰歎美之猗字又作褘郭璞注尓雅曰褘謂佳麗輕美之㒵今此覺支由定加行伏沉掉故引定身心輕美安和即當輕美美之義故得定者非唯心安調暢亦復容㒵光潤矣檀波羅蜜具云檀那波羅蜜多檀𨚗此云施也波羅蜜云彼岸也多云到也言施能到彼岸後之五度波羅蜜多皆准此釋也尸波羅蜜具云尸羅此曰清淨羼提羼初莧反此云安忍毗梨耶此云精進禪𨚗此云靜慮謂淨心思慮也舊翻為思惟修者略也般若此云惠也西域惠有二名一名般若二名末底智唯一名謂之諾般即是第十智度名也僧伽藍具云僧伽羅摩言僧者衆也伽羅摩者國也或云衆所樂住處也捨諸罪軛軛於隔反珠叢曰軛謂車轅端撗木也今謂諸罪賀檐在身如牛為重載所壓在家纍繫如牛被軛脫入道猶捨軛也袈裟具正云迦邏沙曳此云染色衣西域俗人皆著白色衣也紹隆紹市沼反切韻稱紹緣也鄭注禮記曰隆猶盛也言繼嗣宗業令興盛者也統理統他宋反漢書臣瓚注曰統惣也玉篇曰理洽也言惣管攝治御之也闍梨具云阿闍梨此云軌範師謂與弟子軌則師範然有五種闍梨一羯磨二威儀三依止四受經五十戒闍梨西域又有君持闍梨撿束顏注漢書曰撿局也謂拘局之不使分散也舊文依撿驗之蓋今依撿繫之義也僧伽梨正云僧揭胝此曰和合衣謂要須兩重合成故也噬諸煩𢙉噬常制反三蒼曰噬嚙也字宜從竹巫也盥掌盥古滿反說文曰盥澡手也發趾趾之市反字林曰趾足也陂澤陂彼為反說文曰穿地通水曰池畜水曰陂也池沼沼之繞反說文曰沼池也汲井廣雅曰扱取也取水於井故曰汲井園圃蒼頡篇曰種樹曰園種菜曰圃也耘除耘于君反韻圃稱耘鋤也毛詩傳曰秋除草也字又作耘兩體今經本作藝字者此乃藝薹菜名也頭陀正云杜多此曰抖擻謂去離緣務少欲知足蕁十地一種行皆能棄拾煩惱故也醜陋玉篇曰陋猥也謂容貌猥𢙣也沙門正云沙迦葾囊此云止息謂止息一切諸不善法又曰劬勞謂修一切劬勞苦行又曰聽聞謂多聞熏習是常業故又云止息者謂袈裟蔭力止息一切不安隱故也婆羅門此云捨惡法又曰淨行也操行操倉到反王逸注楚辭曰操志也玉篇曰持志貞固日操也甲胄廣雅曰胄兜鍪也鍪音牟鎧仗鎧肯代反仗除亮反說文曰鎧甲也風土記曰仗謂刀㦸之揔名也顏注漢書曰仗謂所持兵器也字宜從立人經本有從木者棒杖字也或從手者杖託字也不矯威儀矯居夭反賈注國語曰行非先王之法曰矯玉篇曰矯假也詐也今言威儀真實不詐現異相也字宜從手經本從矢者王逸注楚辝曰直也爾雅云勇也蒼頡篇曰正也此乃並非經意也林藪藪桑走反鄭玄注周禮曰澤無水曰藪又曰藪大澤也又云水晞之澤曰藪韓詩傳曰澤中可禽獸居之曰藪麁澀澀字有作澀者不是字也諷誦諷方鳳反鄭玄注周禮曰背文曰諷以聲節之曰誦也佛塔塔梵言也或曰偷婆正云窣堵及此翻為墳陵若飯食時飯扶晚反說文云飯食也謂食飯也蓋喫之異名尓賢首菩薩品上摩訶衍具云摩訶衍那言摩訶者此云大也衍那者云乘也兼利文字集略曰兼并也言菩薩自利復利於他故云兼利也晃曜晃胡廣反說文曰晃明也廣雅曰晃暉也字又作晄絢煥絢呼遍反鄭注儀禮曰絢謂文彩成也何晏注論語曰煥明也劫中飢饉饉渠吝反爾雅曰穀不熟曰飢蔬不熟曰饉穀梁傳曰一穀不升曰嗛二穀不升曰飢三穀不升曰饉四穀不升曰康五穀不升曰大浸升登也成也墨子曰一穀不收謂之饉二穀不收謂之旱三穀不收謂之凶四穀不收謂之餽五穀不收謂之飢饉言五穀者禮記月令云麥菽稷麻黍也或曰房散角苗𥢶也飢字或作餞也愜牽協反俾樂色俾卑尓反孔安國注書曰俾使也所好尚好呼到反樂也顏注漢書曰尚崇者也離喧憒憒公對反廣雅曰憒亂也雅思淵才思先吏反淵烏玄反毛詩傳曰淵深也良醫毛詩傳曰良善也醫字或作醫也示謁天廟謁於歇反蒼頡篇曰示現也尓雅曰謁請也言示現祈請天神靈廟也蹲踞蹲徂崙反踞居御反稟雅稟彼錦反孔安國注書曰稟受也字冝從來古文作稟也經卷第十五賢首品下瀑流瀑蒲報反說文曰瀑疾雨也謂天澍淬疾大雨山川洪流忽尓而至也船筏筏房越反方言曰等謂之草箄謂之筏秦晉通語也又按暫縛柴木水中運載者亦曰筏也筏字又作橃兩躰也毀呰呰資尓反說文曰呰呵也逮成逮唐愛反鄭注禮記曰逮及也謂預及於事也拯蒸之上聲杜注左傳曰拯救助也惠施廣雅曰惠賜也饌饌仕眷反尓雅曰饌美也戈鋋劍㦸戈古禾反鋋市連反小雅曰戈劒㦸也說文曰戈謂平頭㦸也聲類曰鋋鏦也鏦音忩許叔重注淮南子曰鋋小矛也方言曰吳楊江淮南楚之間謂矛為鋋按論語圖戈形旁出一刃也戟形旁出兩刃也弧矢弧戶吾反矢式耳反說文弧木弓也考工記曰剡木曰矢謂即箭也弧字經本有從矢邊作弧或矢邊作直作瓜者皆無典據矢字又作𠂕或亦作𥬘車輿輿與居反玉篇曰輿謂車之捴名也何况况許誑反况字正體兩點邊作經本有從三點者說文謂之寒水珠乖譬况之義者也須玉篇曰須俄須之間也俱舍論云百二十剎那為一怛𠛴那量六十怛𠛴那為一臘縛三十臘縛為一須三十須為一晝夜也敗衄衄女育反玉篇曰衄折挫也左思吳都賦曰衄挫是也徒旅旅力與反孔安注書曰徒衆也旅猶言侶廣雅曰侶伴也竄匿竄粗亂反玉篇曰竄逃藏也廣雅曰匿隱也釋提桓勘此中梵本與前第一卷說不殊古人謬置桓字深成罪過也蹈徒倒反說文曰蹈踏也僅渠吝反說文曰僅才能也字從墓省故但革下土也憂悴悴疾醉反方言曰悴傷謂容貌瘦字又作頌被甲被皮義反廣雅曰被加也謂加之於身也𦊰網𦊰古泫反珠藂曰𦊰謂以繩繫取鳥也字又作羂也忉利天忉利梵言正云怛唎耶怛唎奢言怛唎耶者此云三也怛唎奢者十三也謂須山頂四方各有八天城當中有一大城帝釋所居揔數有三十三處故從處立名也摩䤈首羅正云摩䤈溼伐羅言摩䤈者此云大也溼伐羅者自在也謂此天王於大千世界中得自在故也無所拒拒渠呂反字冝作岠孔安注書曰岠違也玉篇曰岠推挌之也方言云格也止也今經本從手者此則時俗共用耳珂雪色珂可何反玉篇曰珂謂螺屬所出於海其白若雪所以嬰馬膺者也馬𤤼按馬腦梵音謂之阿溼嚩揭波言阿溼嚩者此云馬也嚩音符何反揭波者腦也藏也若言阿溼摩揭波此云石藏按此寶出石中故應名石藏寶古來以馬聲濫石藏聲濫腦故謬云馬腦也多羅華具釋如下三十三中曼陀羅花此云悅意花又曰雜色花亦云柔軟聲亦云天妙花雞羅多摩雞羅具云雞薩羅此曰花葉也多摩具云多摩羅此云天花也謂此香是天上花葉所作也婆利師迦此云兩時生者花即以此花和合為香故還立此名按梵語云婆利師此云兩也迦者時也其花要至兩時方生故名也末利利香末利香花名也其花黃金色然非末利之言即翻為黃也經卷第十六升須頂品置普光明藏廣雅曰置者也謂安者於其藏中也十千層級層賊楞反級居立反按梵本中謂之出超十千繒綺繒疾陵反說文曰繒謂帛之惣名也白布邪文曰綺也釋名曰綺崎也其文崎邪不順經緯之縱撗也迦葉具云迦攝波此曰飲光斯則一家之姓氏彼佛降生此姓氏中即以姓為名也拘那牟尼正云迦𨚗牟𡰱言拘𨚗者此云金也牟𡰱仙也佛是大仙身真金色故此名佛為金色仙也迦羅鳩䭾具云迦羅鳩忖䭾此云所應斷已斷毗舍浮正云毗溼婆部言毗溼婆者此云遍一切也部自在也言遍於一切皆得自在或翻為一切有也尸棄正云式棄𨚗此云持髻或曰有髻也毗婆尸此云淨觀或曰勝觀亦云勝見或曰種種觀弗沙正云勃沙此云增威提舍正云底沙依西域訓字云底謂底邏那此云度也沙謂皤沙此云說也言說法度人也波頭摩正云鉢特忙此云赤蓮花也須頂上偈讚品阿盧𨚗華此云曰欲出時紅赤之相其花色似彼故用彼名之謂即紅蓮花也𨚗羅陀華𨚗羅正曰㮈羅此云人陀謂陀羅此云持也其花香妙人皆佩之故曰人持華也性爾爾猶如此也如此即是印可之言故珠叢曰爾謂言相然也寧受玉篇曰寧願辭也偉哉偉于鬼反說文曰偉奇也切韻稱傳大也玉篇曰哉謂語末之辝也菩薩十住品虛間無為曰虛無事曰間宴宴於見反顏注漢書曰宴謂安息者也吼呼口反教詔教古孝古包二反詔章曜章遙二反尓雅曰詔導也郭璞曰謂教導之也經卷第十七梵行品逮於無上逮唐愛反尓雅曰逮與也與即古之預字今經意謂得預無上樂果也喉吻吻無粉反蒼頡篇曰吻謂層兩頭邊也預流味叢曰凡事相及為預也此中謂於見道第十六心得果捨向及遁聖衆行流故曰預流者也阿羅漢按梵語中此名舍攝多義依大婆沙論第九十四卷中四義釋一者應供二者煞賊三者不生四者遠惡依唯識論中三義以釋一已永害煩惱賊故二應受世間妙供養故三永不復處分假生故依成實論中一釋謂斷惑盡故名阿羅漢舊翻之為無生者謂三界惑盡更無三界生故也羯磨此云辦事謂諸法事由茲成辦也和上按五天雅言和上謂之塢波陀耶然彼土流俗謂之殟杜于闐疏勒乃云鶻社今此方訛音謂之和上雖諸方殊異今依正釋言塢波者此云近也陀耶者讀也言此尊師為弟子親近習讀之者也舊云親教是也阿闍梨此云軌範軌範即是師義謂與弟子為法則也初發心功德品寧為多不寧年形反玉篇曰寧安也漢書集注曰安焉也安焉之言皆是徵周之辝耳焉音於𧆛反哥羅分正云迦羅此云豎析人身上一毛為一百中之一分也或曰十六分中之一分或義譯為校量分迦音量䭾反優波尼沙陀分正云塢波尼殺曇言塢波者近也尼殺曇者少也謂少許相近此類之分也或曰優波此云近也尼沙陀對也謂相近比對分也或云極也謂數中之極此中經意無限善根多少俱無此對設其少許亦無限極也且置此喻廣雅曰置捨也須陀洹正云𡨧路陀阿鉢囊言𡨧路陀者此云入也阿鉢囊者此云流也謂適斷見惑捨異生性初獲聖性入聖行流故名入流也舊安恆字莫知其所以也斯陀含此云一來謂此聖者雖斷欲界修惑六品然為有餘三品示斷此令聖者一度來生欲界故名一來也阿那含此云不還謂斷欲修九品惑畫從此上生色界更不還來受生欲界故名不還也傘桑亶反才昨來反廣雅曰才暫也難制沮沮才歟反李琦注漢書曰制斷也禁也毛詩傳曰沮止也不告勞孟康注韓詩曰古者名吏休假曰告也又按告謂告訴即辝聞之言也故詩云王事鞅掌不敢告勞是也覲謁覲渠吝反謁於歇反珠藂曰覲謂就見尊老也杜注左傳曰謁白也謂答白溫清起居之事也鑽仰鑽則官反論語曰子見齊縗者冕衣裳者與瞽者見之雖少必作過之必趍顏淵喟然歎曰仰之高鑽之堅何晏注云言其不可窮極也謂道高且堅都無際限再仰益高再鑽益堅也耽味耽都合反按玉篇字林等嗜色為媅嗜灑曰鴆耳類媅字作妉今經本作耽字時俗共行未詳所出也座賈注國語曰寶也乍可量廣雅曰乍暫也經卷第十八明法品超諸等列韻圃稱等高也杜注左傳列位也鄭注禮記曰列等比也張湛注列子曰禽狩之智有與人同居則有群行則有列列立位也舛舛昌䎡反珠叢曰舛相違背也鄭注禮記曰誤也文相連屬成文相連對文相屬三摩鉢底此云等至謂由加行伏沉掉力至其定立身心安和也皆無瑕玷瑕行加反玷丁念反廣雅曰瑕裂也毛詩傳曰也凡物之有過者皆由玉之瑕玷古來以為通語也植承力反蒼頡篇曰植種也經本有作殖字者非此用也經卷第十九佛升夜摩天宮品莫不自謂珠叢曰莫無也玉篇曰謂猶言也道也夜摩宮中偈讚品靡不充珠叢曰靡無也小雅曰充備也斯尚然雅曰斯此也十行品無屈撓行撓女教如紹二反杜注左傳曰撓曲也漢書集注曰撓觸也此中文意明精進波羅蜜勇捍榮勤無退屈無怯弱也撓字正應從本經本有從手者音呼高反撓擾之字非此所用也靡所資贍考工記因資取也小雅曰贍足也言觸事乏少無取足處也又郭象注㽵子曰資給濟也聲類曰贍助也言孤焭無人濟助也補伽羅正云補特伽羅此曰數取趣謂造集不息數數取苦果也摩納婆正云摩𨚗婆此曰年少者謂儒童也姝麗姝昌逾反說文曰姝色美也小雅曰麗著也謂顏色鮮著也玩玩五假反廣雅曰珍重也賈注國語曰珍美也書曰玩人喪德玩物喪志孔安國注曰以人為戲弄則喪德以器物為戲弄則喪志今此謂所愛重戲弄之具也字又作貦妧兩體或戲人為妧狎習為說貪受為忨也若或從事邇雅曰或有也河上公注老子曰從為也頗能頗普我普俄二反廣雅曰頗少也阿鼻地獄阿鼻此云無閒也慶幸幸河耿反劉兆注公羊傳曰幸遇也韻圃稱幸賴也經卷第二十十行品之二無所𮨇戀廣雅曰𮨇眷也毗𡰱正云毗奈耶此曰調伏謂調身語七種非故或謂三業令不造惡無聰敏聰猶忩逮謂記覽疾也杜注左傳曰敏達也頑嚚頑五鰥反嚚魚巾反廣雅曰頑鈍也蒼頡篇曰嚚惡也匪懈匪方尾反孝經曰夙夜匪懈以事一人鄭注匪非也懈墮也按非猶不也無也至法淵底淵烏玄反毛詩曰淵深也無所適莫適丁歷反蜀志諸葛亮曰事以覆踈易奪為益無適無莫為平人情苦親親而踈踈故適莫之道廢人皆樂人從己不樂己從人故易奪之義廢也論語云子口君子之於天下無適無莫也漢書注曰適主也邇雅曰莫定也謂普於一切無偏主親無偏定踈也冀望珠叢曰冀謂心有阿希求也縷力主反不遷身遷七延反鄭注禮記曰遷變改也暨于法界上渠器反珠叢曰暨謂及賴也該廣雅曰該包也未嘗玉篇曰嘗謂昔暫為之也今此云未嘗者即是未嘗為之也聰哲書曰知人則哲邇雅曰哲智也靡所儔儔直由反珠叢曰儔玉篇曰儔類也經卷第二十一十無盡藏品分減施分方云反減閒斬反不非先制說文曰非違也貢高廣雅曰貢上也謂受貢上之國自恃尊高則輕易附庸之國今有自高陵物欲人賔伏者則亦謂之貢高也陵奪蒼頡篇曰陵侵也奪字有作奪者俗啓導說文曰啓開也教也導引也輟己己居里反珠叢曰輟止也謂止卻自用回與人也夭命夭於矯反孔安注書云少喪曰夭也字有作叐者不是字也身嬰重疾嬰於盈反漢書集注曰嬰繞也謂帶𤵜疾猶物之纏繞人也年方玉篇曰方始也正也焭獨𮊵頓焭渠營反孔安注書曰焭單也玉篇云無兄弟曰焭無子曰獨文字集略曰䪺也焭字又作焭惸嬛婛三躰宜時疾捨時速也此蓋蒲板方俗之言王四天下王于誑反韓康注易曰主盛也威德之至王天下我今貧寠寠其矩反蒼頡篇云無財曰貧無財備禮謂之寠也特垂矜念漢書集注曰特獨也毛詩傳曰矜憐也謂偏獨憂憐也以贍於我贍時焰反小雅曰贍足也聲類曰贍助也我等欽風孔安注書曰欽敬也風教也鄭玄注周禮曰風者聖賢治道之遺化也今謂敬用其教令也都不可得漢書拾遺曰都捴也我身薄祜祜胡古反鄭箋詩曰祜福也言冝從示邊古經本有示邊作右音尤救反孔子述易曰祐者助也按經本意明不具足身由薄福所致非關見在人天助故不從右也諸根殘缺傾雪反蒼頡篇曰殘傷也不淨微形毛詩傳曰微瘍也瘍音移益反郭注邇雅曰瘍瘡也言身之不淨如瘡也又王注書曰微賤也言此不淨之身非可貴重也瘍微從彳賤微從人也胞𫨻𫨻徒玩反胞胎分𫨻故云胞𫨻也祇夜此云諷誦伽陀此云諷重誦𡰱陀𨚗此云因緣然有三類一因請而說二因犯制戒三因事說法也優陀𨚗此云無問自說也嬈亂嬈乃烏反三蒼曰撓擾也孔安注書曰擾煩也過咎咎渠久反玉篇曰咎罪也孔安注書曰咎𢙣也經卷第二十二升兜率天宮品綺煥煥呼換反張載注靈光殿賦云綺文也何晏注論語曰煥明也言也文彩分明也頻婆帳頻婆此云身影質謂此帳上㽵嚴具中儀現一切外質之影也或月頻婆鮮赤果名此帳似之故以名也彰施孔安注書曰彰明也施猶發也言以妙寶發明於妙色也頻婆羅香或色鮮赤或能現影淮前帳釋香氣發越漢書集注曰發越謂香氣射散也言香氣才發四散著人如箭射速中也阿樓𨚗香紅赤色香色一如日欲出前之紅赤相即梵語中呼彼赤相為阿樓那也拘蘇摩華此之一名有通有別謂但果本諸花通名拘蘇摩又有一花獨名掏蘇摩其花大小如錢色甚鮮白衆多細圓集共成乍如此方白菊花也樓閣延袤袤莫搆反尓雅曰延長也切韻稱袤廣也聲類云袤長也史記曰蒙恬築長城延袤万餘里是也說文亦同此釋也鮮白衣鮮斯延反玉篇曰鮮好也明也天牟陀羅牟陀羅者三面赦也因於撫擊撫孚武反字正冝作拊廣雅曰拊擊也釋名曰敷也敷以手拍之拍摶也經本作撫字者此乃撫育按撫之字也克諧衆樂尓雅曰克能也孔安注書曰諧和也言能以衆多音樂和合成諸歌曲也稽首作禮周禮大祝辨九拜之儀一曰稽首再拜頭至地也二曰頓首再拜頭叩地也三曰空首再拜頭至手也四曰振首戰動拜也五曰吉祥拜齊縗不拜也下拜六拜稽顙而後拜謂三年服者七曰奇拜謂一拜八曰褒拜謂報拜也九曰肅拜謂但俯而下手也不瞬瞬舒閏反說文曰瞬謂目開閇數搖也字正體作𪱄今並隨俗作瞬也阿迦𡰱吒天具云阿迦𡰱瑟吒言阿迦者色也𡰱瑟吒究竟也言其色界十八天中此最終極也又云阿無也迦尼瑟吒小也謂色界十八天中最下一天唯小無大餘十六天上下㸦望亦大亦小此之一天唯大無小故以名也如是儀則邇雅曰儀法也恱豫豫余據反珠叢曰心安知恱謂之豫也經卷第二十三兜率天宮偈讚品良沃田沃烏鵠反漢書集注曰沃溉灌也言其土地有溉灌之利也今謂溉灌之田復加𦘺善故曰良沃田也十回向品瞋佷佷何墾反杜注左傳曰佷戾也說文曰佷不聽從也按玉篇佷字在彳部今多從立人蓋是時俗共行也崇巖邃谷邃辛醉反鄭注考工記曰崇高也說文曰邃深也邃字從遂韻也入苦籠檻檻胡黤反籠字正冝作攏三蒼曰攏所以宬禽狩櫚檻也說文曰攏牢也郭璞注山海經曰檻欄也謂穿地為坈上櫺子以欄禽狩也今經意謂三界皆昔如彼攏檻囚繫衆生也或謂三途劇苦名苦攏檻者也衆苦大壑壑呵各反兼名苑曰東海有大燋石一名沃燋方圓三万里水沃之則消盡過此有大壑一名尾閭深莫測其涯海水常澍不知其所之也今經意謂生死海中三苦八苦無有涯底如彼大壑故借喻言耳五欲所致顏注漢書曰致謂引而至之也志獨無侶鄭注禮記曰志意也侶伴也謂廣心獨濟不待伴也顧復一切衆生復扶福反詩云父兮生我母兮掬我拊我言我長我育我𮨇我復我出入復我鄭玄箋曰𮨇視也復反也言去子雖近猶步步反視也又箋詩曰是復者感念兩重復之也今經意菩薩於衆生亦然矣經卷第二十四回向品之二供養瞻待毛詩傳曰瞻視也鄭注周禮曰待給也謂看視供給之也寶璫樹璫得郎反釋名曰穿耳施珠曰璫按其一當乃用數種珠貫穿重懸之也薩婆若具云薩婆若臺薩婆此云一切也若囊智也軒檻軒許言反檻胡黤反漢書音義曰軒謂檻匕板也珠叢曰檻謂殿之欄也漢書集注曰檻謂軒前欄板也澡漱澡子老反漱史救反蒼頡篇曰澡盥也盥音古滿反珠叢曰盥洗手也說文曰漱蕩口者也羣萌萌莫耕反漢書集注曰萌謂草木初生也毛詩傳曰羣衆也言童蒙凡夫猶彼衆小草也又或字冝作眠毛詩傳曰珉民珉音與萌同也無躁𥪰心躁則到反賈逵注國語曰躁擾也鄭注論語曰躁謂不安靜也有見為二二則為𥪰則是動不安靜也經卷第二十五回向品之三懺除懺梵音也具云懺摩此云請忍謂請賢聖或清淨僧忍受悔過恬然宴寂恬田鹽反宴於見反方言曰恬然靜也漢書音義曰宴安居也寂無聲也超然出現鄭注書曰超出前也方言曰超遠也謂獨出高遠也其心彌廣郭注邇雅曰彌極意也言心極廣大耳臨御大國賈注國語曰臨治也鄭注禮記曰御主也謂主領而治理之也名振天下振之刃反說文曰振舉也杜注左傳曰振發也謂加名遠發起也發號施令廣雅曰號告也施設也令教也謂發言告示設教使行之也溥蔭萬方溥潘補反珠叢曰溥遍也今並作普字也感德從化邇雅曰感動也毛詩傳曰從隨也說文曰依教行曰化也言德能動之謂教令也一切周給謂周匝供給故云周給也被隆育反賈逵注國語曰煞也僧坊坊甫良反韻林曰坊區也謂區院也揣食揣字正冝摶音徒鸞反字從喪聲非從甫韻流俗不能別茲兩形遂用揣字揣初委反此乃揣量之字也咽咀咽於見反咀才與反廣雅曰咀嚼也不咳咳克代反玉篇曰咳上欶也欶音蘇豆反芬馥馥扶福反鄭注邇雅曰芬香氣調也字林曰馥香氣盛也覆育賈注國語曰育生也言如天覆如地生也車𤦲梵音正云牟娑羅揭婆言牟娑羅者此云勝也揭婆藏也舊名為車𤦲者所未詳也瑚梵本正云鉢攞娑褐羅寶樹之名其樹身幹枝條葉皆紅色又按說文云珊瑚色赤生之於海或出山中也經卷第二十六回向品之四貧窮孤露孤焭裸露故云孤露駕以駿馬駿將𨳝反駕䭾也說文曰駿謂焉之良才也又音私閏反毛詩傳曰駿也兩義俱通牽御御魚據反廣雅曰御侍也進也駕馭馭魚據反玉篇曰馭即古之御字也今按諸書裝鞁為駕牽空為馭也㽵嚴巨麗巨字古作岠珠叢曰岠至也王逸注楚辝曰麗美好也謂至極美好者也翼從孔安注書曰翼輔也毛詩傳曰翼敬也疲䪺文字集略曰䪺損也謂勞倦者力也柔明孔安注書曰柔謂和柔也言其行調柔識明利也袨服莊嚴袨胡練反切韻稱好衣曰袨服虔注漢書曰袨服大盛玄黃之服也年齒杜注左傳曰齒列也謂與己行列也司馬彪注莊子曰齒數也謂年壽之數也奉養養余亮反說文曰奉承也謂承事供養也其心曠然曠苦謗反河上公注老子經曰曠廣大也說文曰曠明也竒萬計說文曰計算也謂算計有万故曰萬計也周匝填飾填唐賢反賈注國語曰填加也言加之以飾又字或宜作鈿音與填同文字集略云鈿謂金花也萬邦遵奉鄭玄注周禮曰大曰邦小曰國邦之所居亦曰國也三蒼曰遵習也邇雅曰導從也說文曰奉承也言從今承稟也享灌頂位享虛兩反玉篇曰享當也杜注左傳曰享受也庇蔭庇必至反鄭注禮記曰庇蔭者也光踰曒日曒經了反埤蒼曰曒明也聲類作晈首冠十力㽵嚴之冠上𭁺字音古亂反鄭注禮記曰著𭁺為𭁺也下𭁺字音古丸反撿繫其身漢書音義曰撿局也謂繫縛局也裸胡瓦盧果二反字又作倮裸將之死地毛詩傳曰之至也爾雅曰之仁也永訣訣古穴反切韻稱訣別也砧陟林反斫銼之機也字又作砧屠割玉篇曰屠謂分割牲肉也木槍槍七羊反蒼頡篇曰槍謂木兩頭𨦣者也又音楚庚反非此所用也經本有作鏘者此乃鏗鏘之字深為差謬失經意也貫古丸反阿逸多正云阿制多此曰無能勝也語主者言廣雅曰主也謂守當者也記莂莂彼列反本作別字者誤經卷第二十七回向品之五密緻髮緻直利反經本有作稚字者此乃幼稚之字深為謬光明鑒徹鑒古懺反廣雅曰鑒照也聾聵耳聵五怪反韋昭注國語曰耳不別五樂之和謂之聾從生即聾謂之聵字又作聾二形蒙昧鄭玄注周禮曰蒙冒也蒼頡篇曰昧冥也言昏冒暗冥也輟身要用珠叢曰輟止也謂止絶己之要用也銛白牙齒銛斯鹽反漢書音義銛利也字從舌聲也迦尸國迦尸者西域竹名也其竹堪為箭幹然以其國多出此竹故立斯名其國即在中天笁境憍薩羅國之北鄰乃是十六大國之一數也尋即敗壞杜注左傳曰尋續也言絶成已續即壞也逢𨒦引納方言曰逢謂逆𨒦也納入也謂逆首迎之引入住處也不尚社注左傳曰尚上也今謂不以之為上也傭丑恭反又音與恭反非此所用字又作𦟛七仞汝胤反何承纂要云七尺曰仞小雅曰四尺曰仞慈仁蒞物蒞力至反毛詩傳曰蒞臨也心懷殘忍漢書集注曰殘謂多所煞也今謂忍於煞故云殘忍者也衆罪由生邇雅曰由從也一切宗信白虎通曰宗尊言尊重信受也經卷第二十八回向品之六造立精舍藝文類聚云精舍者非以舍之精妙名為舍由其精練行者之所居故謂之精舍也資生什物漢書集注曰什物者為生之具三蒼曰什聚也雜也吳楚間謂資生雜具為什物也恭恪恪康鸖反孔安注書曰恪敬也不匱匱其位反漢書音曰匱空也廣雅曰匱乏也王京都公羊傳曰京師者何天子之居也京者大也師者衆也天子之居以衆大之辭言之也左氏傳曰邑有宗庿先君之主曰都無者曰邑廣雅曰都國也風俗通云天子治居之域舊曰郡曰邑者也關防防浮亡反妓侍衆女妓奇綺反埤蒼曰妓美女也為侍謂之妓侍也或曰妓女樂也美女為樂亦云妓樂或有作伎者言支義反傷字也非此所用也罄所毛詩曰傳曰罄盡也杜注左傳曰寶也中悔中陟仲反宣正法劉瓛注易曰廣也郭璞注邇雅曰極意也雅曰宣明者也無毒虐孔安注書曰虐暴也言無毒𢙣猝暴之性也率土玉篇曰率遵也用也謂遵用教命之處也牀蓐蓐如欲反聲類曰蓐薦也郭璞注尓雅曰蓐席也案古者薦席通稱謂之蓐也然今別有厚氊衣以表裏亦謂之褥其字正冝從衣邊作辱也經卷第二十九回向品之七己頭充滿己基理反僮㒒作使作則各反使所吏反按玉篇古之用字幼童為僮㒒為與今一倍別也鄭注禮記曰㒒謂賤伇之人也發言誠諦河上公注老子曰誠實也方言曰諦審也謂所出言教真實審定也庶品庶衆也品類也衆覺流類謂之衆類也經卷第三十回向品之八若專勵勵力制反杜注左傳曰勵勸也玉篇曰勵勉也謂自強策勤也若起行行遐孟反經卷第三十一回向品之九周聞聞無運反一毛端量處量力仗反端頭也賈注云量分齊也誕生誕唐亶反珠叢曰誕育也賈注國語曰育生也分無遐邇邇雅曰遐遠也孔安注書曰近也經卷第三十二回向品之十離垢繒繒疾陵反說文曰繒謂帛之惣名凡綵帛皆是經卷第三十三回向品之十一寶多羅形多羅者西域樹名也其形似棕櫚樹也體堅如䥫長稠密縱多時大雨其蔭處乾若屋下今以此寶而成故曰寶多羅也又或翻為高竦樹也延袤袤莫搆反義已見上逈然高出逈胡頂反邇雅曰逈遠言獨出高遠也繚以寶繩繚零鳥反說文曰繚纏也聳擢聳息勇反義已見上稠密稠直由反寶跋陀羅跋陀具云跋陀羅此曰賢也寶吹吹昌僞反其音清亮亮力仗反廣雅曰亮朗也嗅許救反俗作嗅經卷第三十四十地品之一蘇利耶藏菩薩蘇利耶者此云白也俱蘇摩德菩薩俱蘇摩者花名也具云俱蘇摩𨚗俱蘇此云恱也摩𨚗意也其花色美氣香形狀端正見聞之者無不恱意今此菩薩取之為名也舉要言之漢書集注曰舉惣也廣雅云要約也珂貝壁玉珂恪何反玉篇曰珂螺屬也所出於海其白若雪所以嬰馬膺者也說文曰貝謂海介蟲也壁瑞玉也安邇雅云玉肉倍好謂之壁璧形圓而有孔玉王者祭天神以用之矣練金練字玉篇作煉字書作練今經本作練者揀練字也為將為師將資亮反師所律反瑕玷玷丁念反玷字有本作點者也瑕玷之義並見上也道險易易以豉反郭注邇雅口易平也經卷第三十五十地品之二仁恕恕傷預反釋名曰仁忍也謂好生惡煞善𢙣含忍聲類曰仁心庶物曰恕也何况從事河上公注老子曰從為也風雅典則語毛詩序曰風以動之教以化之雅正也漢書注曰雅間麗也邇雅曰典經也毛詩傳曰則法也依經化誘之言謂之風典語美妙方法之說謂之雅則語也湍馳奔激湍吐官反激經歷反說文曰激疾瀨也淺水流沙上曰湍也馳急走也水文疑邪疾急曰激也我原阜阜扶九反尓雅曰高厚廣平曰陸大陸曰阜按陸即原也重械重直隴反械侯界反三界焚如苦無量周易離卦九四注云其炎始盛故曰如今此言三界諸惑如火熾盛能招感多苦果故也生難遭想韓詩傳曰遭遇也捫摸捫莫痕反摸謀各反毛詩傳曰捫持也方言曰摸撫也郭璞注曰謂撫指橫索之也蚊蚋蚋如鋭反字林曰蚋小蚊也稱兩稱昌孕反古稱為纏今流俗共用稱字甚也無閒然閒皆莧反玉篇曰間隔也言情無阻隔也國城財貝貝比賴反說文曰貝謂海介夬丸古者貨貝而寶龜也謂海蟲有甲作錦文者也今西域用貝為錢故云財貝也孰能邇雅曰孰誰經卷第三十六十地品之三偱身觀偱祥倫反珠叢曰偱巡也念謂四念處中第一觀身不淨從頭至足次第巡歷三十六物皆不淨也易誨易羊鼓反無慍暴慍於運反暴蒱報反蒼頡篇曰慍恨也玉篇曰暴陵犯也謂欺陵觸披於人也按暴字正體作暴若曝物為之曝也璽璽斯爾反鄭玄注周禮曰璽所也蔡雍獨斷曰天子之璽以王為之古者尊卑通用自秦以來唯天子得其稱也鬼魅魅眉祕反魑魅也字又作魅俗蠱毒蠱公戶反左傳曰於文皿蟲杜預注曰皿器也所以器受蟲害人為蠱也聲類曰謂蟲物病害人也身相休咎休許鄒反咎其抑反杜注左傳曰休福祿也廣雅曰休善也孔安注書曰咎惡也說文曰咎灾也休息之字立人旁作木者許丘反流轉遲回苦趣中遲回二字應作祗徊楚辭曰欲彽徊以于際王逸注云彽徊猶俳佪也經本皆作遲回之字者此乃緩歸之名非俳佪之義埤蒼曰彽徊謂姆遊者也苦海淪𣷢滑相余反廣雅曰淪沉也毛詩傳曰湑落也經卷第三十七十地品之四我𢢔溉灌溉古代反說文曰溉灌澍木也涕泗咨嗟涕他禮反泗先利反咨將伊反毛詩傳曰自目曰涕自鼻曰泗玉篇曰咨嗟差歎也詩箋曰嗟咨歎之深也彼己己居理反彼他也己自也王后所生禮記曰天子之妃曰后也泥潦潦郎搗反說文曰潦天雨也謂因天雨稸積之也經卷第三十八十地品之五念務皆息務事也謂攀緣事境心絶也即便𭔏寤寤兩字經本並從穴者且皆非是字然寤字去八字書乃以為寤睡之字音云五盍反今冝作覺也二行相行兩行字並遐孟反也汝今適得適尸亦反三蒼頡曰適始也近也各若干微塵漢書胡廣曰逆順也干求也當順所求而與之故謂若干也顏師古曰若干且毅數之語也干猶箇也謂當如此數耳毗舍衆謂商估種族也首陀具云輸達羅此云農業種族也邪魔之道杜預注左傳曰道猶法術鄭注禮記曰道猶行也路也因風濟毛詩傳曰濟渡也羈繫羈寄宜反王逸注楚詞曰生為貪愛等所繫亦然矣禪定境排排蒱諧反也經卷第三十九十地品之六𧆛誠賈注國語曰虔固也邇雅曰誠信也萬種繽紛下繽匹人反紛撫云反漢書集注曰繽紛衆疾㒵謂衆多急下也𠛴利王具云𠛴𤇅利耶此云土田主也餘不重受重除用反再也塵相如故杜注左傳曰故猶舊也塵字按字林隱文作塵今有從兩上者不是字也花香篋力鹽反篋牽協反珠叢曰凡宬物小器皆謂之字又作奩篋並是竹器衣箱小者之類耳噓許於反此氣也鈿廁其閒鈿唐賢反文字集略曰鈿金花也廣雅曰廁間也珠叢曰金鈿婦人首飾也鞞陀梨山鞞者此云種種也陀梨亦曰䭾羅此云持也謂此山中能持種種衆寶反諸花故名之𠃵陀山具云瑜𠃵駃羅言瑜𠃵者此云雙也䭾羅持也𡰱民陀山具云𡰱民䭾羅者也此曰持邊山者也斫迦羅山正云拘羯羅此云輪也計都末底山計都此云幢也末底𠅤也嶷然住嶷魚力反嶷謂義崱也字指曰嶷崱山峯㒵今謂十地依佛智如十山依大地雖峯峙各殊而所依是一也毗陀發妙光毗陀謂前鞞陀梨山發妙光謂喻發光地毫未度空可知量度唐各反量力杖反經卷第四十十定品之一𨚗伽慧𨚗伽此云龍也而竟不覩鄭箋詩曰竟終也覩見也南無正云萳忙此曰教禮摩納婆此云孺童也
